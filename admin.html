const getBulkAssignments = (taskId) => sf(`/rest/v1/bulk_task_assignments?bulk_task_id=eq.${taskId}&select=*,profiles!inner(debtor_number,display_name,username,current_balance)&order=profiles(debtor_number).asc`);

// ========== TASK MANAGER ==========
function TaskManager({ tasks, profiles, onDone, privacyMode }) {
  const [tab, setTab] = useState('bulk');
  const [reviewItem, setReviewItem] = useState(null);
  const [fineAmt, setFineAmt] = useState('');
  const [fineNote, setFineNote] = useState('');
  const [acceptNote, setAcceptNote] = useState('');
  const [ld, setLd] = useState(false);
  const [ok, setOk] = useState('');
  const [err, setErr] = useState('');
  const [assignPid, setAssignPid] = useState('');
  const [assignTitle, setAssignTitle] = useState('');
  const [assignDesc, setAssignDesc] = useState('');
  const [assignDue, setAssignDue] = useState('');
  const [assignType, setAssignType] = useState('admin_assigned');
  const [assigning, setAssigning] = useState(false);
  const [assignOk, setAssignOk] = useState('');
  const [taskShield, setTaskShield] = useState(null);

  // === BULK TASKS STATE ===
  const [bulkView, setBulkView] = useState('list');
  const [bulkTasks, setBulkTasks] = useState([]);
  const [selBulkTask, setSelBulkTask] = useState(null);
  const [bulkAssignments, setBulkAssignments] = useState([]);
  const [bulkLd, setBulkLd] = useState(false);
  const [bTitle, setBTitle] = useState('');
  const [bDesc, setBDesc] = useState('');
  const [bDeadline, setBDeadline] = useState('');
  const [bFineAmt, setBFineAmt] = useState('');
  const [bSelected, setBSelected] = useState({});
  const [bSaving, setBSaving] = useState(false);
  const [bOk, setBOk] = useState('');
  const [bErr, setBErr] = useState('');
  const [bSendNotif, setBSendNotif] = useState(true);
  const [bFiningAll, setBFiningAll] = useState(false);
  const [bFineOk, setBFineOk] = useState('');
  const [showEndedTasks, setShowEndedTasks] = useState(false);

  const loadBulkTasks = async () => { setBulkLd(true); try { const t = await getBulkTasks(); setBulkTasks(t || []); } catch(e) { console.error(e); } setBulkLd(false); };
  useEffect(() => { if (tab === 'bulk') loadBulkTasks(); }, [tab]);

  const openBulkTask = async (task) => { setSelBulkTask(task); setBulkView('detail'); setBFineOk(''); try { const a = await getBulkAssignments(task.id); setBulkAssignments(a || []); } catch(e) { console.error(e); setBulkAssignments([]); } };
  const startBulkCreate = () => { setBulkView('create'); setBTitle(''); setBDesc(''); setBDeadline(''); setBFineAmt(''); setBOk(''); setBErr(''); const sel = {}; profiles.forEach(p => { if (p.is_active !== false) sel[p.id] = true; }); setBSelected(sel); };
  const toggleBDebtor = (id) => setBSelected({...bSelected, [id]: !bSelected[id]});
  const bSelectAll = () => { const sel = {}; profiles.forEach(p => { sel[p.id] = true; }); setBSelected(sel); };
  const bSelectNone = () => setBSelected({});

  const createBulkTask = async () => {
    if (!bTitle.trim()) { setBErr('Task title is required'); return; }
    const selectedIds = Object.entries(bSelected).filter(([k,v]) => v).map(([k]) => k);
    if (selectedIds.length === 0) { setBErr('Select at least one debtor'); return; }
    setBSaving(true); setBErr(''); setBOk('');
    try {
      const taskRes = await sf('/rest/v1/bulk_tasks', { method: 'POST', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify({ title: bTitle.trim(), description: bDesc.trim() || null, deadline: bDeadline || null, fine_amount: parseFloat(bFineAmt) || 0 }) });
      const taskId = taskRes[0].id;
      const assigns = selectedIds.map(pid => ({ bulk_task_id: taskId, profile_id: pid, status: 'assigned' }));
      await sf('/rest/v1/bulk_task_assignments', { method: 'POST', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify(assigns) });
      if (bSendNotif) {
        const notifs = selectedIds.map(pid => ({ profile_id: pid, notification_type: 'general', title: '📋 New Task Assigned', message: (bDesc.trim() || bTitle.trim()), created_at: new Date().toISOString() }));
        await sf('/rest/v1/notifications', { method: 'POST', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify(notifs) });
      }
      setBOk(`✅ Task assigned to ${selectedIds.length} debtors${bSendNotif ? ' + notifications sent' : ''}`);
      await loadBulkTasks(); setTimeout(() => { setBulkView('list'); setBOk(''); }, 2000);
    } catch(e) { setBErr('Error: ' + e.message); }
    setBSaving(false);
  };

  const markBCompleted = async (assignId) => { try { await sf(`/rest/v1/bulk_task_assignments?id=eq.${assignId}`, { method: 'PATCH', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify({ status: 'completed', completed_at: new Date().toISOString() }) }); setBulkAssignments(bulkAssignments.map(a => a.id === assignId ? {...a, status: 'completed', completed_at: new Date().toISOString()} : a)); } catch(e) { console.error(e); } };
  const markBAssigned = async (assignId) => { try { await sf(`/rest/v1/bulk_task_assignments?id=eq.${assignId}`, { method: 'PATCH', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify({ status: 'assigned', completed_at: null }) }); setBulkAssignments(bulkAssignments.map(a => a.id === assignId ? {...a, status: 'assigned', completed_at: null} : a)); } catch(e) { console.error(e); } };

  const endBulkTask = async (taskId) => {
    try {
      await sf(`/rest/v1/bulk_tasks?id=eq.${taskId}`, { method: 'PATCH', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify({ is_active: false }) });
      setBulkView('list'); setSelBulkTask(null); await loadBulkTasks();
    } catch(e) { setBFineOk('Error: ' + e.message); }
  };

  const bulkFine = async () => {
    const incomplete = bulkAssignments.filter(a => a.status === 'assigned');
    if (incomplete.length === 0) return;
    const fAmt = parseFloat(selBulkTask?.fine_amount) || 0;
    if (fAmt <= 0) { setBFineOk('⚠️ No fine amount set for this task.'); return; }
    setBFiningAll(true); setBFineOk('');
    let count = 0;
    try {
      for (const a of incomplete) {
        const bal = parseFloat(a.profiles?.current_balance) || 0; const nb = bal + fAmt; const now = new Date().toISOString();
        const maxRowRes = await sf(`/rest/v1/ledger?profile_id=eq.${a.profile_id}&select=row_order&order=row_order.desc&limit=1`);
        const nextRow = (maxRowRes && maxRowRes[0] ? (maxRowRes[0].row_order || 0) + 1 : 1);
        await insertLedger({ profile_id: a.profile_id, entry_type: 'Fine', entry_date: now, amount: fAmt, balance_after: nb, description: `Task fine: ${selBulkTask.title}`, admin_fee: 0, created_at: now, tokens_awarded: 0, row_order: nextRow });
        await patchProfile(a.profile_id, { current_balance: nb });
        await sf(`/rest/v1/bulk_task_assignments?id=eq.${a.id}`, { method: 'PATCH', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify({ status: 'fined', fined_at: now }) });
        await sf('/rest/v1/notifications', { method: 'POST', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify({ profile_id: a.profile_id, notification_type: 'general', title: '⚠️ Task Fine', message: `You were fined ${fmt(fAmt)} for not completing: ${selBulkTask.title}. New balance: ${fmt(nb)}.`, created_at: now }) });
        count++;
      }
      setBFineOk(`✅ Fined ${count} debtors £${fAmt} each.`);
      const updated = await getBulkAssignments(selBulkTask.id); setBulkAssignments(updated || []); onDone?.();
    } catch(e) { setBFineOk('Error: ' + e.message); }
    setBFiningAll(false);
  };

  const pending = tasks.filter(t => t.status === 'submitted');
  const active = tasks.filter(t => t.status === 'active' || t.status === 'overdue');
  const history = tasks.filter(t => t.status === 'accepted' || t.status === 'fined');

  const doAccept = async () => {
    if (!reviewItem) return;
    setLd(true); setErr(''); setOk('');
    try {
      const result = await acceptTask(reviewItem.id, acceptNote);
      if (result?.error) { setErr(result.error); } else { setOk('✅ Task accepted for ' + (result?.debtor || '')); setReviewItem(null); onDone?.(); }
    } catch(e) { setErr('Error: ' + e.message); }
    setLd(false);
  };

  const doFine = async () => {
    if (!reviewItem || !fineAmt) return;
    setLd(true); setErr(''); setOk('');
    try {
      const result = await fineTask(reviewItem.id, parseFloat(fineAmt), fineNote);
      if (result?.error) { setErr(result.error); } else { setOk('⚠️ Fined ' + fmt(result.fine_amount) + ' — ' + (result?.debtor || '')); setReviewItem(null); onDone?.(); }
    } catch(e) { setErr('Error: ' + e.message); }
    setLd(false);
  };

  const doAssign = async () => {
    if (!assignPid || !assignTitle) { setErr('Select a debtor and enter a title'); return; }
    setAssigning(true); setErr(''); setAssignOk('');
    try {
      const dueDate = assignDue ? new Date(assignDue).toISOString() : null;
      const result = await assignTask(assignPid, assignTitle, assignDesc, dueDate, assignType);
      if (result?.error) { setErr(result.error); } else {
        setAssignOk('✅ Task assigned to ' + (result?.debtor || ''));
        setAssignTitle(''); setAssignDesc(''); setAssignDue(''); onDone?.();
      }
    } catch(e) { setErr('Error: ' + e.message); }
    setAssigning(false);
  };

  return (
    <div className="page">
      <div className="page-title">📋 Task Manager</div>

      <div className="tabs">
        <button className={`tab ${tab==='bulk'?'active':''}`} onClick={()=>{setTab('bulk');setBulkView('list');}}>Bulk Assign</button>
        <button className={`tab ${tab==='pending'?'active':''}`} onClick={()=>setTab('pending')}>Submitted ({pending.length})</button>
        <button className={`tab ${tab==='active'?'active':''}`} onClick={()=>setTab('active')}>Active ({active.length})</button>
        <button className={`tab ${tab==='assign'?'active':''}`} onClick={()=>setTab('assign')}>Assign 1</button>
        <button className={`tab ${tab==='history'?'active':''}`} onClick={()=>setTab('history')}>History</button>
      </div>

      {ok && <div className="success-msg" style={{marginBottom:'12px'}}>{ok}</div>}
      {err && <div className="error-msg" style={{marginBottom:'12px'}}>{err}</div>}

      {tab === 'pending' && !reviewItem && (
        pending.length === 0 ? <div className="empty-state">No submitted tasks to review</div> :
        <div className="feed-list">{pending.map(t => (
          <div className="feed-item" key={t.id} onClick={()=>{setReviewItem(t);setOk('');setErr('');setFineAmt('');setFineNote('');setAcceptNote('');}} style={{cursor:'pointer'}}>
            <div className="feed-icon fi-tok">📋</div>
            <div className="feed-body">
              <div className="feed-text"><strong>{t.profiles?.debtor_number} {privacyMode?'••••':t.profiles?.display_name}</strong> — {t.title}</div>
              <div className="feed-time">Submitted {ago(t.submitted_at||t.created_at)}{t.due_date && ` · Due: ${fmtD(t.due_date)}`}</div>
            </div>
            <div style={{color:'var(--gold)',fontSize:'14px',flexShrink:0}}>→</div>
          </div>
        ))}</div>
      )}

      {tab === 'pending' && reviewItem && (
        <div style={{background:'var(--bg-card)',border:'1px solid var(--border-gold)',borderRadius:'var(--radius)',padding:'20px',marginBottom:'16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
            <div style={{fontSize:'16px',fontWeight:600,color:'var(--gold)'}}>{reviewItem.title}</div>
            <button className="btn btn-sm btn-outline" onClick={()=>setReviewItem(null)}>✕</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'12px'}}>
            <div className="di"><div className="di-label">Debtor</div><div className="di-value">{reviewItem.profiles?.debtor_number} {privacyMode?'':reviewItem.profiles?.display_name}</div></div>
            <div className="di"><div className="di-label">Type</div><div className="di-value">{reviewItem.task_type}</div></div>
            <div className="di"><div className="di-label">Due</div><div className="di-value">{reviewItem.due_date?fmtD(reviewItem.due_date):'No deadline'}</div></div>
            <div className="di"><div className="di-label">Submitted</div><div className="di-value">{ago(reviewItem.submitted_at||reviewItem.created_at)}</div></div>
          </div>
          {reviewItem.description && <div style={{fontSize:'13px',color:'var(--text-dim)',marginBottom:'12px',padding:'10px',background:'var(--bg-input)',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)'}}>{reviewItem.description}</div>}

          <div className="form-group"><label className="form-label">Accept Note (optional)</label><input className="fi" value={acceptNote} onChange={e=>setAcceptNote(e.target.value)} placeholder="Good work..." /></div>
          <button className="btn" onClick={doAccept} disabled={ld} style={{width:'100%',marginBottom:'12px'}}>{ld?<span className="spinner"/>:'✅ Accept Task'}</button>

          <div style={{borderTop:'1px solid var(--border)',paddingTop:'12px',marginTop:'4px'}}>
            <div style={{fontSize:'12px',fontWeight:600,color:'var(--red)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>Or issue a fine</div>
            <div style={{display:'flex',gap:'8px',marginBottom:'8px'}}>
              <input className="fi" type="number" inputMode="decimal" placeholder="Fine amount (£)" value={fineAmt} onChange={e=>setFineAmt(e.target.value)} style={{flex:1}} />
              <input className="fi" placeholder="Reason..." value={fineNote} onChange={e=>setFineNote(e.target.value)} style={{flex:2}} />
            </div>
            <button className="btn btn-danger" onClick={doFine} disabled={ld||!fineAmt} style={{width:'100%'}}>{ld?<span className="spinner"/>:'⚠️ Fine Debtor'}</button>
          </div>
        </div>
      )}

      {tab === 'active' && (
        active.length === 0 ? <div className="empty-state">No active tasks</div> :
        <div className="feed-list">{active.map(t => {
          const due = t.due_date ? new Date(t.due_date) : null;
          const isOverdue = due && due < new Date();
          return (
            <div className="feed-item" key={t.id} style={{borderLeftColor:isOverdue?'var(--red)':'var(--gold)',borderLeftWidth:'3px'}}>
              <div className="feed-icon" style={{background:isOverdue?'rgba(231,76,60,0.15)':'rgba(201,168,76,0.15)'}}>{isOverdue?'🚨':'📋'}</div>
              <div className="feed-body">
                <div className="feed-text"><strong>{t.profiles?.debtor_number} {privacyMode?'••••':t.profiles?.display_name}</strong> — {t.title}</div>
                <div className="feed-time">{due ? (isOverdue?'OVERDUE — was due ':'Due: ')+fmtD(t.due_date) : 'No deadline'} · Assigned {ago(t.created_at)}</div>
              </div>
            </div>
          );
        })}</div>
      )}

      {tab === 'assign' && (
        <div>
          {assignOk && <div className="success-msg" style={{marginBottom:'12px'}}>{assignOk}</div>}
          <div className="form-group"><label className="form-label">Debtor</label>
            <select className="fs" value={assignPid} onChange={e=>{setAssignPid(e.target.value);setTaskShield(null);setErr('');if(e.target.value){getDebtorAddons(e.target.value).then(r=>{const ts=(r||[]).find(a=>a.item_type==='task_shield'&&a.shield_uses_remaining>0);setTaskShield(ts||null);}).catch(()=>setTaskShield(null));}}}>
              <option value="">Select debtor...</option>
              {profiles.map(p=>(<option key={p.id} value={p.id}>{p.debtor_number} — {privacyMode?'••••':p.display_name}</option>))}
            </select>
          </div>

          {/* Task Shield Warning */}
          {taskShield && (
            <div style={{background:'rgba(92,184,122,0.08)',border:'2px solid rgba(92,184,122,0.4)',borderRadius:'var(--radius)',padding:'16px',marginBottom:'16px'}}>
              <div style={{fontSize:'14px',fontWeight:700,color:'var(--green)',marginBottom:'8px'}}>🚫 This debtor has an active Task Shield!</div>
              <div style={{fontSize:'13px',color:'var(--text-dim)',lineHeight:1.6,marginBottom:'12px'}}>{taskShield.shield_uses_remaining} use(s) remaining. You cannot assign a task while this shield is active. Mark it as used to proceed.</div>
              <button className="btn btn-sm" style={{width:'100%'}} onClick={async()=>{try{const r=await markAddonUsed(taskShield.id);if(r?.error){setErr('❌ '+r.error);}else{setAssignOk('✅ Task Shield used ('+r.uses_remaining+' left). You can now assign a task.');setTaskShield(r.uses_remaining>0?{...taskShield,shield_uses_remaining:r.uses_remaining}:null);}}catch(e){setErr('❌ '+e.message);}}}>🚫 Mark Task Shield as Used</button>
            </div>
          )}
          <div className="form-group"><label className="form-label">Task Title</label><input className="fi" value={assignTitle} onChange={e=>setAssignTitle(e.target.value)} placeholder="e.g. Write 50 lines" /></div>
          <div className="form-group"><label className="form-label">Description (optional)</label><textarea className="ft" value={assignDesc} onChange={e=>setAssignDesc(e.target.value)} placeholder="Details about the task..." /></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <div className="form-group" style={{margin:0}}><label className="form-label">Due Date</label><input className="fi" type="datetime-local" value={assignDue} onChange={e=>setAssignDue(e.target.value)} /></div>
            <div className="form-group" style={{margin:0}}><label className="form-label">Type</label>
              <select className="fs" value={assignType} onChange={e=>setAssignType(e.target.value)}>
                <option value="admin_assigned">Admin Assigned</option>
                <option value="lines">Lines</option>
                <option value="custom_task">Custom Task</option>
              </select>
            </div>
          </div>
          <button className="btn" onClick={doAssign} disabled={assigning} style={{width:'100%',marginTop:'16px'}}>{assigning?<span className="spinner"/>:'📋 Assign Task'}</button>
        </div>
      )}

      {tab === 'history' && (
        history.length === 0 ? <div className="empty-state">No completed tasks yet</div> :
        <div className="feed-list">{history.map(t => (
          <div className="feed-item" key={t.id}>
            <div className="feed-icon" style={{background:t.status==='accepted'?'rgba(76,175,80,0.15)':'rgba(231,76,60,0.15)'}}>{t.status==='accepted'?'✅':'⚠️'}</div>
            <div className="feed-body">
              <div className="feed-text"><strong>{t.profiles?.debtor_number} {privacyMode?'••••':t.profiles?.display_name}</strong> — {t.title}</div>
              <div className="feed-time">{t.status==='accepted'?'Accepted':'Fined '+fmt(t.fine_amount)} · {ago(t.resolved_at||t.created_at)}{t.fine_note?' · '+t.fine_note:''}</div>
            </div>
          </div>
        ))}</div>
      )}

      {/* === BULK ASSIGN TAB === */}
      {tab === 'bulk' && bulkView === 'list' && (
        <div>
          <button className="btn" onClick={startBulkCreate} style={{width:'100%',marginBottom:'12px'}}>+ Assign New Bulk Task</button>
          <label className="cb-row" style={{marginBottom:'12px',padding:'8px 12px'}}>
            <input type="checkbox" checked={showEndedTasks} onChange={e=>setShowEndedTasks(e.target.checked)} />
            <span style={{fontSize:'13px'}}>Show ended tasks</span>
          </label>
          {bulkLd ? <div className="loading-screen"><div className="spinner"/><span>Loading...</span></div> :
            bulkTasks.filter(t => showEndedTasks || t.is_active !== false).length === 0 ? <div className="empty-state">No bulk tasks assigned yet</div> :
            <div className="feed-list">
              {bulkTasks.filter(t => showEndedTasks || t.is_active !== false).map(t => {
                const dl = t.deadline ? new Date(t.deadline) : null;
                const overdue = dl && dl < new Date();
                const ended = t.is_active === false;
                return (
                  <div className="feed-item" key={t.id} onClick={() => openBulkTask(t)} style={{opacity: ended ? 0.5 : 1}}>
                    <div className={`feed-icon ${ended ? 'fi-fee' : (overdue ? 'fi-fine' : 'fi-pay')}`}>{ended ? '🏁' : (overdue ? '⏰' : '📋')}</div>
                    <div className="feed-body">
                      <div className="feed-text"><strong>{t.title}</strong>{ended && <span style={{color:'var(--text-muted)',fontSize:'11px',marginLeft:'8px'}}>ENDED</span>}</div>
                      <div className="feed-time">{dl ? `Deadline: ${fmtD(t.deadline)}${overdue ? ' — OVERDUE' : ''}` : 'No deadline'}{t.fine_amount > 0 && ` · Fine: ${fmt(t.fine_amount)}`}</div>
                    </div>
                    <div style={{color:'var(--gold)',fontSize:'14px',flexShrink:0}}>→</div>
                  </div>
                );
              })}
            </div>
          }
        </div>
      )}

      {tab === 'bulk' && bulkView === 'create' && (() => {
        const selCount = Object.values(bSelected).filter(Boolean).length;
        return (
          <div>
            <button className="back-btn" onClick={() => setBulkView('list')}>← Back</button>
            <div className="form-group"><label className="form-label">Task Title</label><input className="fi" value={bTitle} onChange={e => setBTitle(e.target.value)} placeholder="e.g. Buy Mind Body Wallet Clip" /></div>
            <div className="form-group"><label className="form-label">Description / Message</label><textarea className="ft" value={bDesc} onChange={e => setBDesc(e.target.value)} placeholder="This will be sent as the notification message..." /></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
              <div className="form-group"><label className="form-label">Deadline</label><input className="fi" type="datetime-local" value={bDeadline} onChange={e => setBDeadline(e.target.value)} /></div>
              <div className="form-group"><label className="form-label">Fine if missed (£)</label><input className="fi" type="number" inputMode="decimal" value={bFineAmt} onChange={e => setBFineAmt(e.target.value)} placeholder="0" /></div>
            </div>
            <div className="form-group"><label className="cb-row"><input type="checkbox" checked={bSendNotif} onChange={e => setBSendNotif(e.target.checked)} /><span style={{fontSize:'13px'}}>📨 Send notification to selected debtors</span></label></div>
            <div style={{marginBottom:'16px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
                <label className="form-label" style={{margin:0}}>Assign To ({selCount} selected)</label>
                <div style={{display:'flex',gap:'6px'}}>
                  <button className="btn btn-sm btn-outline" style={{padding:'4px 10px',fontSize:'11px'}} onClick={bSelectAll}>All</button>
                  <button className="btn btn-sm btn-outline" style={{padding:'4px 10px',fontSize:'11px'}} onClick={bSelectNone}>None</button>
                </div>
              </div>
              <div style={{maxHeight:'300px',overflowY:'auto',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',background:'var(--bg-input)'}}>
                {profiles.map(p => (
                  <label key={p.id} className="cb-row" style={{borderRadius:0,borderBottom:'1px solid var(--border)',padding:'10px 12px',background: bSelected[p.id] ? 'var(--gold-glow)' : 'transparent'}}>
                    <input type="checkbox" checked={!!bSelected[p.id]} onChange={() => toggleBDebtor(p.id)} />
                    <span style={{fontSize:'13px'}}>{p.debtor_number} — {privacyMode ? '••••' : p.display_name}{!privacyMode && p.username && <span style={{color:'var(--text-muted)',fontStyle:'italic'}}> @{p.username}</span>}</span>
                  </label>
                ))}
              </div>
            </div>
            {bErr && <div className="error-msg" style={{marginBottom:'12px'}}>{bErr}</div>}
            {bOk && <div className="success-msg" style={{marginBottom:'12px'}}>{bOk}</div>}
            <button className="btn" onClick={createBulkTask} disabled={bSaving} style={{width:'100%'}}>{bSaving ? <span className="spinner"/> : `Assign to ${selCount} Debtors`}</button>
          </div>
        );
      })()}

      {tab === 'bulk' && bulkView === 'detail' && selBulkTask && (() => {
        const bAssigned = bulkAssignments.filter(a => a.status === 'assigned');
        const bCompleted = bulkAssignments.filter(a => a.status === 'completed');
        const bFined = bulkAssignments.filter(a => a.status === 'fined');
        const dl = selBulkTask.deadline ? new Date(selBulkTask.deadline) : null;
        const overdue = dl && dl < new Date();
        const isEnded = selBulkTask.is_active === false;
        return (
          <div>
            <button className="back-btn" onClick={() => { setBulkView('list'); setSelBulkTask(null); }}>← Back</button>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
              <div style={{fontSize:'18px',fontWeight:600,color: isEnded ? 'var(--text-dim)' : 'var(--gold)',fontFamily:'Cormorant Garamond, serif'}}>{selBulkTask.title}{isEnded && <span style={{fontSize:'12px',color:'var(--text-muted)',marginLeft:'8px',fontFamily:'DM Sans, sans-serif'}}>ENDED</span>}</div>
              {!isEnded && (
                <button className="btn btn-sm btn-outline" style={{padding:'6px 12px',fontSize:'11px'}} onClick={async()=>{if(!confirm('End this task? It will be marked as inactive.')) return;await endBulkTask(selBulkTask.id);setSelBulkTask({...selBulkTask, is_active:false});await loadBulkTasks();}}>🏁 End Task</button>
              )}
            </div>
            {selBulkTask.description && <div style={{fontSize:'13px',color:'var(--text-dim)',marginBottom:'16px',lineHeight:1.6}}>{selBulkTask.description}</div>}
            <div className="stats-grid" style={{marginBottom:'16px'}}>
              <div className="stat-card"><div className="stat-label">Assigned</div><div className="stat-value sm" style={{color:'var(--text)'}}>{bAssigned.length}</div></div>
              <div className="stat-card"><div className="stat-label">Completed</div><div className="stat-value sm" style={{color:'var(--green)'}}>{bCompleted.length}</div></div>
              {dl && <div className="stat-card"><div className="stat-label">Deadline</div><div className="stat-value sm" style={{fontSize:'14px',color: overdue ? 'var(--red)' : 'var(--text-dim)'}}>{fmtD(selBulkTask.deadline)}{overdue ? ' ⏰' : ''}</div></div>}
              {selBulkTask.fine_amount > 0 && <div className="stat-card"><div className="stat-label">Fine Amount</div><div className="stat-value sm" style={{color:'var(--red)'}}>{fmt(selBulkTask.fine_amount)}</div></div>}
            </div>
            {!isEnded && bAssigned.length > 0 && selBulkTask.fine_amount > 0 && (
              <div style={{marginBottom:'16px'}}><button className="btn btn-danger" onClick={bulkFine} disabled={bFiningAll} style={{width:'100%'}}>{bFiningAll ? <span className="spinner"/> : `⚠️ Fine ${bAssigned.length} Incomplete — ${fmt(selBulkTask.fine_amount)} each`}</button></div>
            )}
            {bFineOk && <div className={bFineOk.startsWith('✅') ? 'success-msg' : 'error-msg'} style={{marginBottom:'12px'}}>{bFineOk}</div>}
            {bAssigned.length > 0 && (
              <div style={{marginBottom:'20px'}}>
                <div className="section-title" style={{color:'var(--red)'}}>❌ Not Completed ({bAssigned.length})</div>
                {bAssigned.map(a => (
                  <div key={a.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',marginBottom:'6px'}}>
                    <div><div style={{fontSize:'13px',fontWeight:600}}>{a.profiles?.debtor_number} — {privacyMode ? '••••' : a.profiles?.display_name}</div>{!privacyMode && a.profiles?.username && <div style={{fontSize:'11px',color:'var(--text-muted)',fontStyle:'italic'}}>@{a.profiles.username}</div>}</div>
                    {!isEnded && <button className="btn btn-sm" style={{padding:'6px 12px',fontSize:'11px'}} onClick={() => markBCompleted(a.id)}>✓ Done</button>}
                  </div>
                ))}
              </div>
            )}
            {bCompleted.length > 0 && (
              <div style={{marginBottom:'20px'}}>
                <div className="section-title" style={{color:'var(--green)'}}>✅ Completed ({bCompleted.length})</div>
                {bCompleted.map(a => (
                  <div key={a.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',background:'rgba(76,175,80,0.05)',border:'1px solid rgba(76,175,80,0.2)',borderRadius:'var(--radius-sm)',marginBottom:'6px'}}>
                    <div><div style={{fontSize:'13px',fontWeight:600,color:'var(--green)'}}>{a.profiles?.debtor_number} — {privacyMode ? '••••' : a.profiles?.display_name}</div>{a.completed_at && <div style={{fontSize:'10px',color:'var(--text-muted)'}}>{fmtD(a.completed_at)}</div>}</div>
                    {!isEnded && <button className="btn btn-sm btn-outline" style={{padding:'4px 10px',fontSize:'10px'}} onClick={() => markBAssigned(a.id)}>Undo</button>}
                  </div>
                ))}
              </div>
            )}
            {bFined.length > 0 && (
              <div>
                <div className="section-title" style={{color:'var(--red)'}}>⚠️ Fined ({bFined.length})</div>
                {bFined.map(a => (
                  <div key={a.id} style={{padding:'10px 12px',background:'rgba(231,76,60,0.05)',border:'1px solid rgba(231,76,60,0.2)',borderRadius:'var(--radius-sm)',marginBottom:'6px'}}>
                    <div style={{fontSize:'13px',fontWeight:600,color:'var(--red)'}}>{a.profiles?.debtor_number} — {privacyMode ? '••••' : a.profiles?.display_name}</div>
                    {a.fined_at && <div style={{fontSize:'10px',color:'var(--text-muted)'}}>Fined {fmtD(a.fined_at)}</div>}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

// ========== SHOP ITEM MANAGER ==========
function ShopItemManager({ items, onDone }) {
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);
  const [name, setName] = useState('');
  const [desc, setDesc] = useState('');
  const [cost, setCost] = useState('0');
  const [category, setCategory] = useState('tasks');
  const [icon, setIcon] = useState('📦');
  const [itemKey, setItemKey] = useState('');
  const [reqRank, setReqRank] = useState('');
  const [ld, setLd] = useState(false);
  const [ok, setOk] = useState('');
  const [err, setErr] = useState('');

  const startEdit = (item) => {
    setEditing(item); setAdding(false);
    setName(item.name); setDesc(item.description||''); setCost(String(item.token_cost));
    setCategory(item.category); setIcon(item.icon||'📦'); setItemKey(item.item_key);
    setReqRank(item.requires_rank ? String(item.requires_rank) : '');
    setOk(''); setErr('');
  };

  const startAdd = () => {
    setEditing(null); setAdding(true);
    setName(''); setDesc(''); setCost('0'); setCategory('tasks'); setIcon('📦'); setItemKey(''); setReqRank('');
    setOk(''); setErr('');
  };

  const doSave = async () => {
    if (!name.trim() || !itemKey.trim()) { setErr('Name and item key are required'); return; }
    setLd(true); setErr(''); setOk('');
    try {
      const payload = { name: name.trim(), description: desc.trim()||null, token_cost: parseInt(cost)||0, category, icon: icon||'📦', item_key: itemKey.trim(), requires_rank: reqRank ? parseInt(reqRank) : null, is_active: true };
      if (editing) {
        await sf(`/rest/v1/shop_items?id=eq.${editing.id}`, { method: 'PATCH', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify(payload) });
        setOk('✅ Item updated');
      } else {
        payload.sort_order = items.length + 1;
        await sf('/rest/v1/shop_items', { method: 'POST', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify(payload) });
        setOk('✅ Item added');
      }
      setEditing(null); setAdding(false); onDone?.();
    } catch(e) { setErr('Error: ' + e.message); }
    setLd(false);
  };

  const doDelete = async (item) => {
    if (!confirm('Delete "' + item.name + '"? This cannot be undone.')) return;
    try {
      await sf(`/rest/v1/shop_items?id=eq.${item.id}`, { method: 'DELETE' });
      onDone?.();
    } catch(e) { setErr('Error: ' + e.message); }
  };

  const grouped = { rewards: items.filter(i=>i.category==='rewards'), tasks: items.filter(i=>i.category==='tasks'), addons: items.filter(i=>i.category==='addons') };

  return (
    <div className="page">
      <div className="page-title">🏪 Manage Shop Items</div>
      {ok && <div className="success-msg" style={{marginBottom:'12px'}}>{ok}</div>}
      {err && <div className="error-msg" style={{marginBottom:'12px'}}>{err}</div>}

      {(editing || adding) && (
        <div style={{background:'var(--bg-card)',border:'1px solid var(--border-gold)',borderRadius:'var(--radius)',padding:'20px',marginBottom:'16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
            <div style={{fontSize:'14px',fontWeight:600,color:'var(--gold)'}}>{editing?'Edit Item':'Add New Item'}</div>
            <button className="btn btn-sm btn-outline" onClick={()=>{setEditing(null);setAdding(false);}}>✕</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
            <div className="form-group" style={{margin:0}}><label className="form-label">Name</label><input className="fi" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Lines" /></div>
            <div className="form-group" style={{margin:0}}><label className="form-label">Item Key (unique)</label><input className="fi" value={itemKey} onChange={e=>setItemKey(e.target.value)} placeholder="e.g. lines" disabled={!!editing} /></div>
            <div className="form-group" style={{margin:0}}><label className="form-label">Category</label>
              <select className="fs" value={category} onChange={e=>setCategory(e.target.value)}><option value="tasks">Tasks</option><option value="rewards">Rewards</option><option value="addons">Add-ons</option></select>
            </div>
            <div className="form-group" style={{margin:0}}><label className="form-label">Token Cost</label><input className="fi" type="number" value={cost} onChange={e=>setCost(e.target.value)} /></div>
            <div className="form-group" style={{margin:0}}><label className="form-label">Icon (emoji)</label><input className="fi" value={icon} onChange={e=>setIcon(e.target.value)} placeholder="📦" /></div>
            <div className="form-group" style={{margin:0}}><label className="form-label">Requires Rank (rewards only)</label><input className="fi" type="number" value={reqRank} onChange={e=>setReqRank(e.target.value)} placeholder="1, 2, or 3" /></div>
          </div>
          <div className="form-group"><label className="form-label">Description</label><textarea className="ft" value={desc} onChange={e=>setDesc(e.target.value)} /></div>
          <button className="btn" onClick={doSave} disabled={ld} style={{width:'100%'}}>{ld?<span className="spinner"/>:(editing?'Save Changes':'Add Item')}</button>
        </div>
      )}

      <button className="btn btn-outline btn-sm" onClick={startAdd} style={{width:'100%',marginBottom:'16px'}}>+ Add New Shop Item</button>

      {['rewards','tasks','addons'].map(cat => (
        <div key={cat} style={{marginBottom:'16px'}}>
          <div className="section-title">{cat==='rewards'?'🏆 Rewards':cat==='tasks'?'📝 Tasks':'🛡️ Add-ons'} ({grouped[cat].length})</div>
          {grouped[cat].length===0?<div style={{fontSize:'13px',color:'var(--text-muted)',padding:'8px 0'}}>No items</div>:
          grouped[cat].map(item => (
            <div key={item.id} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'12px 14px',marginBottom:'6px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:'14px',fontWeight:600}}>{item.icon} {item.name} {item.token_cost>0?<span style={{color:'var(--text-dim)',fontWeight:400}}>— {item.token_cost}T</span>:''}</div>
                <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'2px'}}>{item.item_key}{item.requires_rank?' · Rank '+item.requires_rank:''}</div>
              </div>
              <div style={{display:'flex',gap:'4px'}}>
                <button className="btn btn-sm btn-outline" style={{padding:'4px 10px',fontSize:'11px'}} onClick={()=>startEdit(item)}>Edit</button>
                <button className="btn btn-sm btn-danger" style={{padding:'4px 10px',fontSize:'11px'}} onClick={()=>doDelete(item)}>✕</button>
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function ShopOrders({ orders, onDone, privacyMode }) {
  const [reviewItem, setReviewItem] = useState(null);
  const [adminNote, setAdminNote] = useState('');
  const [rejectReason, setRejectReason] = useState('');
  const [showReject, setShowReject] = useState(false);
  const [shieldUses, setShieldUses] = useState('1');
  const [shieldDays, setShieldDays] = useState('');
  const [taskDuration, setTaskDuration] = useState('');
  const [activeTasks, setActiveTasks] = useState([]);
  const [activeTab, setActiveTab] = useState('pending');
  const [taskLd, setTaskLd] = useState(false);
  const [ld, setLd] = useState(false);
  const [ok, setOk] = useState('');
  const [err, setErr] = useState('');

  const itemLabels = {
    'lines': '📝 Lines',
    'interest_shield': '🛡️ Interest Shield',
    'fine_shield': '🔰 Fine Shield',
    'task_shield': '🚫 Task Shield',
    'custom_task': '🎯 Custom Task',
    'reward_1st': '🏆 1st Place Reward',
    'reward_2nd': '🥈 2nd Place Reward',
    'reward_3rd': '🥉 3rd Place Reward'
  };

  const isShield = (type) => ['interest_shield','fine_shield','task_shield'].includes(type);
  const isTask = (type) => ['lines','custom_task'].includes(type);

  const loadActiveTasks = async () => {
    setTaskLd(true);
    try {
      const d = await sf('/rest/v1/shop_orders?task_status=in.(active,completed,failed)&select=*,profiles!inner(display_name,debtor_number,username)&order=created_at.desc&limit=100');
      setActiveTasks(d || []);
    } catch(e) { console.error(e); }
    setTaskLd(false);
  };

  useEffect(() => { loadActiveTasks(); }, []);

  const openReview = (item) => {
    setReviewItem(item); setAdminNote(''); setRejectReason(''); setShowReject(false); setOk(''); setErr('');
    setShieldUses('1'); setShieldDays(''); setTaskDuration('');
  };

  const doApprove = async () => {
    if (!reviewItem) return;
    setLd(true); setErr(''); setOk('');
    try {
      const body = { p_order_id: reviewItem.id, p_admin_note: adminNote || null };
      if (isShield(reviewItem.item_type)) {
        body.p_shield_uses = parseInt(shieldUses) || 1;
        body.p_shield_days = shieldDays ? parseInt(shieldDays) : null;
      }
      if (isTask(reviewItem.item_type) && taskDuration) {
        body.p_task_duration_days = parseInt(taskDuration) || null;
      }
      const result = await sf('/rest/v1/rpc/approve_shop_order', { method: 'POST', body: JSON.stringify(body) });
      if (result && result.error) { setErr(result.error); setLd(false); return; }
      setOk(`✅ ${result.item} approved for ${result.debtor}. ${result.tokens_deducted > 0 ? result.tokens_deducted + ' tokens deducted.' : 'No tokens deducted.'}${result.task_duration ? ' Duration: ' + result.task_duration + ' days.' : ''}`);
      setReviewItem(null);
      onDone?.();
      loadActiveTasks();
    } catch(e) { setErr('Error: ' + e.message); }
    setLd(false);
  };

  const doReject = async () => {
    if (!reviewItem) return;
    setLd(true); setErr(''); setOk('');
    try {
      const result = await rejectShopOrder(reviewItem.id, rejectReason);
      if (result && result.error) { setErr(result.error); setLd(false); return; }
      setOk(`❌ ${result.item} rejected for ${result.debtor}. No tokens deducted.`);
      setReviewItem(null);
      onDone?.();
    } catch(e) { setErr('Error: ' + e.message); }
    setLd(false);
  };

  return (
    <div className="page">
      <div className="page-title">🛒 Shop Orders</div>
      
      <div className="tabs">
        <button className={`tab ${activeTab==='pending'?'active':''}`} onClick={()=>setActiveTab('pending')}>Pending ({orders.length})</button>
        <button className={`tab ${activeTab==='active'?'active':''}`} onClick={()=>{setActiveTab('active');loadActiveTasks();}}>Active Tasks ({activeTasks.filter(t=>t.task_status==='active').length})</button>
        <button className={`tab ${activeTab==='history'?'active':''}`} onClick={()=>{setActiveTab('history');loadActiveTasks();}}>History</button>
      </div>

      {ok && <div className="success-msg" style={{marginBottom:'16px'}}>{ok}</div>}
      {err && <div className="error-msg" style={{marginBottom:'16px'}}>{err}</div>}

      {/* === PENDING TAB === */}
      {activeTab === 'pending' && (
        <div>
          {orders.length === 0 && !reviewItem && (<div className="empty-state">No pending shop orders — all clear!</div>)}

      {reviewItem && (
        <div style={{background:'var(--bg-card)',border:'1px solid var(--border-gold)',borderRadius:'var(--radius)',padding:'20px',marginBottom:'20px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
            <div>
              <div style={{fontSize:'16px',fontWeight:600,color:'var(--gold)'}}>{privacyMode ? reviewItem.profiles?.debtor_number : reviewItem.profiles?.display_name}</div>
              <div style={{fontSize:'12px',color:'var(--text-dim)'}}>{reviewItem.profiles?.debtor_number}{!privacyMode && reviewItem.profiles?.username && <span style={{fontStyle:'italic'}}> — @{reviewItem.profiles.username}</span>}</div>
            </div>
            <button className="btn btn-sm btn-outline" onClick={()=>setReviewItem(null)}>✕ Close</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'16px'}}>
            <div className="di"><div className="di-label">Item</div><div className="di-value">{itemLabels[reviewItem.item_type] || reviewItem.item_type}</div></div>
            <div className="di"><div className="di-label">Token Cost</div><div className="di-value">{reviewItem.token_cost > 0 ? reviewItem.token_cost + 'T' : 'Free'}</div></div>
            <div className="di"><div className="di-label">Their Tokens</div><div className="di-value">🪙 {reviewItem.profiles?.token_balance || 0}</div></div>
            <div className="di"><div className="di-label">Submitted</div><div className="di-value">{ago(reviewItem.created_at)}</div></div>
          </div>
          {reviewItem.debtor_note && (<div style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'10px 14px',marginBottom:'16px',fontSize:'13px',color:'var(--text-dim)'}}><span style={{color:'var(--gold)',fontSize:'11px',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.5px'}}>Debtor's Note:</span><br/>{reviewItem.debtor_note}</div>)}

          {!showReject ? (
            <div>
              {/* Shield configuration fields */}
              {isShield(reviewItem.item_type) && (
                <div style={{background:'rgba(92,184,122,0.06)',border:'1px solid rgba(92,184,122,0.2)',borderRadius:'var(--radius-sm)',padding:'12px',marginBottom:'12px'}}>
                  <div style={{fontSize:'11px',fontWeight:600,color:'var(--green)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>🛡️ Shield Settings</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
                    <div className="form-group" style={{margin:0}}>
                      <label className="form-label">Number of Uses</label>
                      <input className="fi" type="number" value={shieldUses} onChange={e=>setShieldUses(e.target.value)} placeholder="1" min="1" />
                      <div className="form-hint">How many times can they use it</div>
                    </div>
                    <div className="form-group" style={{margin:0}}>
                      <label className="form-label">Duration (days)</label>
                      <input className="fi" type="number" value={shieldDays} onChange={e=>setShieldDays(e.target.value)} placeholder="No expiry" min="1" />
                      <div className="form-hint">Leave empty for no expiry</div>
                    </div>
                  </div>
                </div>
              )}
              {/* Task duration config */}
              {isTask(reviewItem.item_type) && (
                <div style={{background:'rgba(201,168,76,0.06)',border:'1px solid var(--border-gold)',borderRadius:'var(--radius-sm)',padding:'12px',marginBottom:'12px'}}>
                  <div style={{fontSize:'11px',fontWeight:600,color:'var(--gold)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>⏱️ Timed Task Settings (optional)</div>
                  <div className="form-group" style={{margin:0}}>
                    <label className="form-label">Duration (days)</label>
                    <input className="fi" type="number" value={taskDuration} onChange={e=>setTaskDuration(e.target.value)} placeholder="e.g. 7 for a 7-day challenge" min="1" />
                    <div className="form-hint">Leave empty if this isn't a multi-day task. Debtor will see a day-by-day countdown.</div>
                  </div>
                </div>
              )}
              <div className="form-group">
                <label className="form-label">Admin Note (optional)</label>
                <input className="fi" type="text" value={adminNote} onChange={e=>setAdminNote(e.target.value)} placeholder="e.g. 50 lines assigned, due Friday..." />
              </div>
              {reviewItem.token_cost > 0 && (
                <div className="preview-box" style={{marginBottom:'16px'}}>
                  <div className="preview-title">Token Preview</div>
                  <div className="preview-row"><span>Current Tokens</span><span>🪙 {reviewItem.profiles?.token_balance || 0}</span></div>
                  <div className="preview-row"><span>Cost</span><span style={{color:'var(--red)'}}>-{reviewItem.token_cost}</span></div>
                  <div className="preview-row total"><span>After Purchase</span><span>🪙 {(reviewItem.profiles?.token_balance || 0) - reviewItem.token_cost}</span></div>
                </div>
              )}
              <div style={{display:'flex',gap:'8px'}}>
                <button className="btn" onClick={doApprove} disabled={ld} style={{flex:1}}>{ld ? <span className="spinner"/> : '✅ Approve'}</button>
                <button className="btn btn-danger" onClick={()=>setShowReject(true)} disabled={ld} style={{flex:1}}>❌ Reject</button>
              </div>
            </div>
          ) : (
            <div>
              <div style={{fontSize:'12px',fontWeight:600,color:'var(--red)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'10px'}}>Reject this order</div>
              <div className="form-group">
                <label className="form-label">Reason (debtor will see this)</label>
                <textarea className="ft" value={rejectReason} onChange={e=>setRejectReason(e.target.value)} placeholder="e.g. Not eligible, insufficient activity..." />
              </div>
              <div style={{display:'flex',gap:'8px'}}>
                <button className="btn btn-danger" onClick={doReject} disabled={ld} style={{flex:1}}>{ld ? <span className="spinner"/> : '❌ Confirm Reject'}</button>
                <button className="btn btn-outline" onClick={()=>setShowReject(false)} disabled={ld} style={{flex:1}}>← Back</button>
              </div>
            </div>
          )}
        </div>
      )}

      {!reviewItem && orders.length > 0 && (
        <div className="feed-list">
          {orders.map(o => (
            <div className="feed-item" key={o.id} onClick={()=>openReview(o)} style={{cursor:'pointer'}}>
              <div className="feed-icon fi-tok">🛒</div>
              <div className="feed-body">
                <div className="feed-text"><strong>{o.profiles?.debtor_number} {privacyMode ? '••••' : o.profiles?.display_name}</strong>{' — '}{itemLabels[o.item_type] || o.item_type}</div>
                <div className="feed-time">{ago(o.created_at)}{o.debtor_note && <span style={{color:'var(--text-dim)'}}> · "{o.debtor_note}"</span>}</div>
              </div>
              <div style={{color:'var(--gold)',fontSize:'14px',flexShrink:0}}>→</div>
            </div>
          ))}
        </div>
      )}
        </div>
      )}

      {/* === ACTIVE TASKS TAB === */}
      {activeTab === 'active' && (
        <div>
          {taskLd ? <div className="loading-screen"><div className="spinner"/><span>Loading...</span></div> :
            activeTasks.filter(t=>t.task_status==='active').length === 0 ? <div className="empty-state">No active timed tasks</div> :
            <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
              {activeTasks.filter(t=>t.task_status==='active').map(t => {
                const daysLeft = (t.task_duration_days || 0) - (t.task_days_completed || 0);
                const pct = t.task_duration_days > 0 ? Math.round(((t.task_days_completed || 0) / t.task_duration_days) * 100) : 0;
                const startDate = t.task_start_date ? new Date(t.task_start_date) : null;
                const daysSinceStart = startDate ? Math.floor((Date.now() - startDate.getTime()) / (1000*60*60*24)) : 0;
                return (
                  <div key={t.id} style={{background:'var(--bg-card)',border:'1px solid var(--border-gold)',borderRadius:'var(--radius)',padding:'16px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
                      <div>
                        <div style={{fontSize:'14px',fontWeight:600,color:'var(--gold)'}}>{itemLabels[t.item_type] || t.item_type}</div>
                        <div style={{fontSize:'12px',color:'var(--text-dim)'}}>{t.profiles?.debtor_number} — {privacyMode ? '••••' : t.profiles?.display_name}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:'16px',fontWeight:700,color: daysLeft <= 1 ? 'var(--green)' : 'var(--text)'}}>{daysLeft} day{daysLeft !== 1 ? 's' : ''} left</div>
                        <div style={{fontSize:'11px',color:'var(--text-muted)'}}>Started {fmtD(t.task_start_date)}</div>
                      </div>
                    </div>
                    {/* Progress bar */}
                    <div style={{height:'8px',background:'var(--bg-input)',borderRadius:'4px',overflow:'hidden',marginBottom:'10px'}}>
                      <div style={{height:'100%',width:`${pct}%`,background: pct >= 100 ? 'var(--green)' : 'var(--gold)',borderRadius:'4px',transition:'width 0.3s'}} />
                    </div>
                    {/* Day checkboxes */}
                    <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'10px'}}>
                      {Array.from({length: t.task_duration_days || 0}, (_,i) => {
                        const completed = i < (t.task_days_completed || 0);
                        const log = (t.task_day_log || [])[i];
                        return (
                          <div key={i} title={log?.completed_at ? 'Day ' + (i+1) + ' — ' + fmtD(log.completed_at) + (log.note ? ' — ' + log.note : '') : 'Day ' + (i+1)} style={{
                            width:'32px',height:'32px',borderRadius:'50%',
                            background: completed ? 'var(--gold)' : 'var(--bg-input)',
                            border: '2px solid ' + (completed ? 'var(--gold)' : 'var(--border)'),
                            display:'flex',alignItems:'center',justifyContent:'center',
                            fontSize:'11px',color: completed ? '#0a0a0a' : 'var(--text-muted)',fontWeight:700
                          }}>
                            {completed ? '✓' : i+1}
                          </div>
                        );
                      })}
                    </div>
                    {t.admin_note && <div style={{fontSize:'12px',color:'var(--text-dim)',marginBottom:'10px',fontStyle:'italic'}}>📝 {t.admin_note}</div>}
                    {/* Mark day buttons */}
                    <div style={{display:'flex',gap:'8px'}}>
                      <button className="btn btn-sm" style={{flex:1}} onClick={async()=>{
                        try{
                          const r=await sf('/rest/v1/rpc/admin_mark_task_day',{method:'POST',body:JSON.stringify({p_order_id:t.id})});
                          if(r?.error){setErr(r.error);}else{setOk(`✅ Day ${r.days_completed}/${r.total_days} marked${r.is_done?' — TASK COMPLETE!':''}`);loadActiveTasks();onDone?.();}
                        }catch(e){setErr('Error: '+e.message);}
                      }} disabled={(t.task_days_completed||0)>=(t.task_duration_days||0)}>✓ Mark Day {(t.task_days_completed||0)+1}</button>
                      <button className="btn btn-sm btn-outline" style={{padding:'6px 12px',fontSize:'11px'}} onClick={async()=>{
                        try{
                          const r=await sf('/rest/v1/rpc/admin_undo_task_day',{method:'POST',body:JSON.stringify({p_order_id:t.id})});
                          if(r?.error){setErr(r.error);}else{setOk('↩ Undid day mark');loadActiveTasks();}
                        }catch(e){setErr('Error: '+e.message);}
                      }} disabled={(t.task_days_completed||0)<=0}>↩ Undo</button>
                    </div>
                  </div>
                );
              })}
            </div>
          }
        </div>
      )}

      {/* === HISTORY TAB === */}
      {activeTab === 'history' && (
        <div>
          {taskLd ? <div className="loading-screen"><div className="spinner"/><span>Loading...</span></div> :
            activeTasks.filter(t=>t.task_status==='completed'||t.task_status==='failed').length === 0 ? <div className="empty-state">No completed tasks yet</div> :
            <div className="feed-list">
              {activeTasks.filter(t=>t.task_status==='completed'||t.task_status==='failed').map(t => (
                <div className="feed-item" key={t.id}>
                  <div className="feed-icon" style={{background:t.task_status==='completed'?'rgba(76,175,80,0.15)':'rgba(231,76,60,0.15)'}}>{t.task_status==='completed'?'✅':'❌'}</div>
                  <div className="feed-body">
                    <div className="feed-text"><strong>{t.profiles?.debtor_number} {privacyMode?'••••':t.profiles?.display_name}</strong> — {itemLabels[t.item_type]||t.item_type}</div>
                    <div className="feed-time">
                      {t.task_status==='completed'?'Completed':'Failed'} · {t.task_days_completed||0}/{t.task_duration_days||0} days
                      {t.admin_note&&' · '+t.admin_note}
                      {' · '+ago(t.resolved_at||t.created_at)}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          }
        </div>
      )}
    </div>
  );
}

function AdminLeaderboard({ leaderboardData, profiles, privacyMode, onView, onRefresh }) {
  const [processing, setProcessing] = useState(false);
  const [updating, setUpdating] = useState(false);
  const [msg, setMsg] = useState('');

  const handleCelebration = async () => {
    setProcessing(true); setMsg('');
    try {
      const result = await triggerCelebration();
      if (result && result.error) { setMsg('❌ ' + result.error); }
      else {
        const winners = Array.isArray(result) ? result : [];
        if (winners.length === 0) { setMsg('✅ Processed — no qualifying winners this week (nobody paid).'); }
        else {
          const summary = winners.map(w => w.emoji + ' ' + w.debtor_number + ' (£' + parseFloat(w.weekly_paid).toFixed(2) + ')').join(', ');
          setMsg('✅ Week processed! Winners: ' + summary + '. Notifications sent. Ranks updated.');
        }
        onRefresh?.();
      }
    } catch(e) { setMsg('❌ Error: ' + e.message); }
    setProcessing(false);
  };

  const handleRankUpdate = async () => {
    setUpdating(true); setMsg('');
    try {
      await triggerRankUpdate();
      setMsg('✅ Rank positions saved. Movement arrows will update on next load.');
      onRefresh?.();
    } catch(e) { setMsg('❌ Error: ' + e.message); }
    setUpdating(false);
  };

  if (!leaderboardData || leaderboardData.length === 0) {
    return (<div className="page"><div className="page-title">⚔️ Leaderboard</div><div className="empty-state">No leaderboard data. Run the get_leaderboard() SQL setup first.</div></div>);
  }
  const profileMap = {};
  profiles.forEach(p => { profileMap[p.id] = p; });
  return (
    <div className="page">
      <div className="page-title">⚔️ Weekly Leaderboard</div>
      <div style={{fontSize:'12px',color:'var(--text-dim)',marginBottom:'16px',textAlign:'center',letterSpacing:'0.5px',textTransform:'uppercase'}}>Sun – Sat Rankings</div>

      <div style={{display:'flex',gap:'8px',marginBottom:'16px'}}>
        <button className="btn btn-outline btn-sm" onClick={handleCelebration} disabled={processing} style={{flex:1,fontSize:'12px'}}>
          {processing ? '⏳ Processing...' : '🏆 Process Week'}
        </button>
        <button className="btn btn-outline btn-sm" onClick={handleRankUpdate} disabled={updating} style={{flex:1,fontSize:'12px'}}>
          {updating ? '⏳ Updating...' : '📊 Save Ranks'}
        </button>
      </div>
      {msg && <div className={msg.startsWith('✅')?'success-msg':'error-msg'} style={{marginBottom:'12px',fontSize:'12px',textAlign:'left'}}>{msg}</div>}

      <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
        {leaderboardData.map((row) => {
          const pos = row.rank_position;
          const pr = profileMap[row.profile_id];
          const displayName = privacyMode ? row.debtor_number : (pr?.display_name || row.debtor_number);
          const posLabel = pos === 1 ? '🏆' : (pos === 2 ? '🥈' : (pos === 3 ? '🥉' : String(pos)));
          const starsDisplay = getStarDisplay(row.first_place_wins);
          let moveEl = <span style={{color:'var(--text-muted)'}}>—</span>;
          const lastRank = row.last_rank || 0;
          if (lastRank > 0 && lastRank !== pos) {
            if (pos < lastRank) moveEl = <span style={{color:'var(--green)'}}>▲{lastRank - pos}</span>;
            else moveEl = <span style={{color:'var(--red)'}}>▼{pos - lastRank}</span>;
          }
          const borderColor = pos === 1 ? 'rgba(255,215,0,0.4)' : (pos === 2 ? 'rgba(192,192,192,0.3)' : (pos === 3 ? 'rgba(205,127,50,0.3)' : 'var(--border)'));
          return (
            <div key={row.profile_id} onClick={() => onView?.(row.profile_id)}
              style={{background:'var(--bg-card)',border:'1px solid '+borderColor,borderRadius:'var(--radius)',padding:'14px 16px',display:'flex',alignItems:'center',gap:'12px',cursor:'pointer',transition:'border-color 0.2s'}}>
              <div style={{fontFamily:'Cormorant Garamond, serif',fontSize:pos<=3?'24px':'18px',fontWeight:700,width:'40px',textAlign:'center',flexShrink:0,color:pos===1?'#ffd700':(pos===2?'#c0c0c0':(pos===3?'#cd7f32':'var(--text-dim)'))}}>
                {posLabel}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:'14px',fontWeight:600}}>{displayName}</div>
                <div style={{fontSize:'12px',color:'var(--text-dim)',marginTop:'2px'}}>
                  {row.debtor_number}
                  {starsDisplay && <span style={{marginLeft:'8px'}}>{starsDisplay}</span>}
                </div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontFamily:'Cormorant Garamond, serif',fontSize:'18px',fontWeight:700,color:'var(--gold)'}}>{fmt(row.weekly_paid||0)}</div>
                <div style={{fontSize:'11px',color:'var(--text-dim)',marginTop:'2px'}}>this week</div>
              </div>
              <div style={{width:'30px',textAlign:'center',fontSize:'13px',flexShrink:0}}>{moveEl}</div>
            </div>
          );
        })}
      </div>

      <div style={{marginTop:'20px',background:'rgba(201,168,76,0.06)',border:'1px solid rgba(201,168,76,0.15)',borderRadius:'8px',padding:'12px',fontSize:'11px',color:'var(--gold-dim)',lineHeight:1.6}}>
        <strong style={{color:'var(--gold)'}}>🏆 Process Week</strong> — Awards ⭐ to 1st place, sends notifications to top 3, saves rank positions. Runs automatically every Sunday at 00:05 UTC.<br/><br/>
        <strong style={{color:'var(--gold)'}}>📊 Save Ranks</strong> — Snapshots current positions for movement arrows. Runs automatically daily at 23:55 UTC.
      </div>
    </div>
  );
}
  
  function App() {
  const [auth, setAuth] = useState(false);
  const [chk, setChk] = useState(true);
  const [pg, setPg] = useState('dashboard');
  const [profs, setProfs] = useState([]);
  const [act, setAct] = useState([]);
  const [stips, setStips] = useState([]);
  const [sel, setSel] = useState(null);
  const [dl, setDl] = useState(false);
  const [privacyMode, setPrivacyMode] = useState(false);
  const [usernames, setUsernames] = useState({});
  const [alerts, setAlerts] = useState([]);
  const [pendingTx, setPendingTx] = useState([]);
  const [lbData, setLbData] = useState([]);
  const [shopOrders, setShopOrders] = useState([]);
  const [allTasks, setAllTasks] = useState([]);
  const [shopItems, setShopItems] = useState([]);
  const [alertPrefs, setAlertPrefs] = useState({ show_overdue_alerts: true, show_fine_review_alerts: true, show_high_balance_alerts: true, dismissed_alerts: [] });
 
  // Load alert prefs from Supabase
  const loadAlertPrefs = useCallback(async () => {
    try {
      const d = await sf('/rest/v1/admin_preferences?admin_id=eq.' + ADMIN_ID + '&select=*');
      if (d && d[0]) setAlertPrefs(d[0]);
    } catch(e) { console.log('Alert prefs not loaded:', e); }
  }, []);
 
  const dismissAlert = useCallback(async (key) => {
    if (!key) return;
    const newDismissed = [...(alertPrefs.dismissed_alerts || []), key];
    const updated = { ...alertPrefs, dismissed_alerts: newDismissed };
    setAlertPrefs(updated);
    try {
      await sf('/rest/v1/admin_preferences?admin_id=eq.' + ADMIN_ID, {
        method: 'PATCH',
        headers: { 'Prefer': 'return=representation' },
        body: JSON.stringify({ dismissed_alerts: JSON.stringify(newDismissed), updated_at: new Date().toISOString() })
      });
    } catch(e) { console.log('Failed to save dismissed alert:', e); }
  }, [alertPrefs]);
 
  const toggleAlertPref = useCallback(async (field) => {
    const updated = { ...alertPrefs, [field]: !alertPrefs[field] };
    setAlertPrefs(updated);
    try {
      await sf('/rest/v1/admin_preferences?admin_id=eq.' + ADMIN_ID, {
        method: 'PATCH',
        headers: { 'Prefer': 'return=representation' },
        body: JSON.stringify({ [field]: !alertPrefs[field], updated_at: new Date().toISOString() })
      });
    } catch(e) { console.log('Failed to save alert pref:', e); }
  }, [alertPrefs]);

  useEffect(() => { (async()=>{ if(await refresh()) setAuth(true); setChk(false); })(); }, []);

  const load = useCallback(async () => {
    setDl(true);
    try {
      const [p, a, s, pt, lb, so, tk, si] = await Promise.all([getProfiles(), getAllLedger(100), getAllStips(), getPendingTx(), getLeaderboard().catch(()=>[]), getShopOrders().catch(()=>[]), getAllTasks().catch(()=>[]), getShopItems().catch(()=>[])]);
      setLbData(lb||[]);
      setShopOrders(so||[]);
      setAllTasks(tk||[]);
      setShopItems(si||[]);
      setProfs(p||[]);
      setAct(a||[]);
      setStips(s||[]);
      setPendingTx(pt||[]);
      
      // Generate alerts
      const al = generateAlerts(p||[], s||[], a||[]);
      setAlerts(al);
    } catch(e) { console.error(e); }
    setDl(false);
  }, []);

  // Build usernames map from profiles (uses `username` column in profiles table)
  useEffect(() => {
    if (!auth || profs.length === 0) return;
    const map = {};
    profs.forEach(p => { if (p.username) map[p.debtor_number] = p.username; });
    setUsernames(map);
  }, [auth, profs]);

  useEffect(() => { if(auth) load(); }, [auth, load]);
  useEffect(() => { if(auth) loadAlertPrefs(); }, [auth, loadAlertPrefs]);
  
  const vd = (id) => { setSel(id); setPg('detail'); };
  const lo = () => { logout(); setAuth(false); setProfs([]); setAct([]); };

  if (chk) return <div className="login-screen"><div className="spinner"/></div>;
  if (!auth) return <LoginScreen onLogin={()=>setAuth(true)} />;

  return (
    <div className="app-shell">
      <header className="header">
        <div className="header-brand"><span className="header-crown">👑</span><span className="header-title">Truee Empire</span></div>
        <div className="header-actions">
          <button className="header-btn" onClick={()=>{load();}} title="Refresh data" style={{fontSize:'16px'}}>🔄</button>
          <button className={`header-btn ${privacyMode?'active':''}`} onClick={()=>setPrivacyMode(!privacyMode)} title={privacyMode?'Show names':'Hide names'}>
            {privacyMode ? '🙈' : '👁'}
          </button>
          <button className="header-logout" onClick={lo}>Sign Out</button>
        </div>
      </header>
      {dl&&profs.length===0 ? <div className="loading-screen" style={{minHeight:'60vh'}}><div className="spinner"/><span>Loading empire data...</span></div> : <>
        {pg==='dashboard'&&<Dashboard profiles={profs} activity={act} onView={vd} alerts={alerts} privacyMode={privacyMode} alertPrefs={alertPrefs} onDismiss={dismissAlert} onTogglePref={toggleAlertPref} />}
        {pg==='leaderboard'&&<AdminLeaderboard leaderboardData={lbData} profiles={profs} privacyMode={privacyMode} onView={vd} onRefresh={load} />}
        {pg==='debtors'&&<DebtorList profiles={profs} onView={vd} stips={stips} usernames={usernames} privacyMode={privacyMode} />}
        {pg==='detail'&&<Detail pid={sel} onBack={()=>setPg('debtors')} usernames={usernames} privacyMode={privacyMode} onUsernameUpdate={load} />}
        {pg==='add'&&<AddTx profiles={profs} stips={stips} onDone={load} privacyMode={privacyMode} />}
        {pg==='approvals'&&<Approvals pending={pendingTx} onDone={load} privacyMode={privacyMode} />}
        {pg==='shop-orders'&&<ShopOrders orders={shopOrders} onDone={load} privacyMode={privacyMode} />}
        {pg==='task-manager'&&<TaskManager tasks={allTasks} profiles={profs} onDone={load} privacyMode={privacyMode} />}
        {pg==='shop-manage'&&<ShopItemManager items={shopItems} onDone={load} />}
        {pg==='activity'&&<div className="page"><div className="page-title">Activity Feed</div><Feed items={act} onTap={vd} limit={100} privacyMode={privacyMode} /></div>}
        {pg==='settings'&&<Settings onLogout={lo} />}
        {pg==='guide'&&<Guide />}
        {pg==='onboard'&&<Onboard profiles={profs} onDone={load} />}
      </>}
      <nav className="bottom-nav">
        <button className={`nav-item ${pg==='dashboard'?'active':''}`} onClick={()=>setPg('dashboard')}>
          <span className="nav-icon">📊</span><span className="nav-label">Home</span>
          {alerts.length>0&&pg!=='dashboard'&&<span className="badge">{alerts.length}</span>}
        </button>
        <button className={`nav-item ${pg==='leaderboard'?'active':''}`} onClick={()=>setPg('leaderboard')}><span className="nav-icon">⚔️</span><span className="nav-label">Ranks</span></button>
        <button className={`nav-item ${pg==='debtors'||pg==='detail'?'active':''}`} onClick={()=>setPg('debtors')}><span className="nav-icon">👥</span><span className="nav-label">Debtors</span></button>
        <button className={`nav-item ${pg==='add'?'active':''}`} onClick={()=>setPg('add')}><span className="nav-icon">➕</span><span className="nav-label">Add</span></button>
        <button className={`nav-item ${pg==='onboard'?'active':''}`} onClick={()=>setPg('onboard')}><span className="nav-icon">🆕</span><span className="nav-label">Onboard</span></button>
        <button className={`nav-item ${pg==='approvals'?'active':''}`} onClick={()=>setPg('approvals')} style={{position:'relative'}}>
          <span className="nav-icon">📥</span><span className="nav-label">Approvals</span>
          {pendingTx.length>0&&<span className="badge">{pendingTx.length}</span>}
        </button>
        <button className={`nav-item ${pg==='shop-orders'?'active':''}`} onClick={()=>setPg('shop-orders')} style={{position:'relative'}}>
          <span className="nav-icon">🛒</span><span className="nav-label">Shop</span>
          {shopOrders.length>0&&<span className="badge">{shopOrders.length}</span>}
        </button>
        <button className={`nav-item ${pg==='task-manager'?'active':''}`} onClick={()=>setPg('task-manager')} style={{position:'relative'}}>
          <span className="nav-icon">📋</span><span className="nav-label">Tasks</span>
          {allTasks.filter(t=>t.status==='submitted').length>0&&<span className="badge">{allTasks.filter(t=>t.status==='submitted').length}</span>}
        </button>
        <button className={`nav-item ${pg==='shop-manage'?'active':''}`} onClick={()=>setPg('shop-manage')}>
          <span className="nav-icon">🏪</span><span className="nav-label">Items</span>
        </button>
        <button className={`nav-item ${pg==='activity'?'active':''}`} onClick={()=>setPg('activity')}><span className="nav-icon">📋</span><span className="nav-label">Feed</span></button>
        <button className={`nav-item ${pg==='tasks'?'active':''}`} onClick={()=>setPg('tasks')}><span className="nav-icon">📋</span><span className="nav-label">Tasks</span></button>
        <button className={`nav-item ${pg==='guide'?'active':''}`} onClick={()=>setPg('guide')}><span className="nav-icon">📖</span><span className="nav-label">Guide</span></button>
        <button className={`nav-item ${pg==='settings'?'active':''}`} onClick={()=>setPg('settings')}><span className="nav-icon">⚙️</span><span className="nav-label">Settings</span></button>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
