<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Truee Empire — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-card: #111111;
    --bg-card-hover: #1a1a1a;
    --bg-input: #161616;
    --gold: #c9a84c;
    --gold-dim: #a8893d;
    --gold-glow: rgba(201, 168, 76, 0.15);
    --gold-glow-strong: rgba(201, 168, 76, 0.3);
    --text: #e8e8e8;
    --text-dim: #888888;
    --text-muted: #555555;
    --green: #4caf50;
    --red: #e74c3c;
    --blue: #5b9bd5;
    --border: #222222;
    --border-gold: rgba(201, 168, 76, 0.3);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 4px; }
  .login-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 24px;
  }
  .login-crown { font-size: 48px; margin-bottom: 16px; }
  .login-title {
    font-family: 'Cormorant Garamond', serif; font-size: 28px;
    font-weight: 600; color: var(--gold); margin-bottom: 4px;
  }
  .login-subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 32px; }
  .login-form { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; }
  .login-form input {
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px; color: var(--text);
    font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none;
    transition: border-color 0.2s;
  }
  .login-form input:focus { border-color: var(--gold); }
  .login-form input::placeholder { color: var(--text-muted); }
  .btn {
    background: var(--gold); color: #0a0a0a; border: none;
    border-radius: var(--radius-sm); padding: 14px 24px; font-size: 15px;
    font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer;
    transition: all 0.2s; text-align: center;
  }
  .btn:hover { background: #d4b35a; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg {
    background: rgba(231, 76, 60, 0.1); border: 1px solid rgba(231, 76, 60, 0.3);
    color: var(--red); padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 13px; text-align: center;
  }
  .success-msg {
    background: rgba(76, 175, 80, 0.1); border: 1px solid rgba(76, 175, 80, 0.3);
    color: var(--green); padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 13px; text-align: center;
  }
  .app-shell { min-height: 100vh; padding-bottom: 80px; }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(12px); z-index: 100;
  }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .header-crown { font-size: 24px; }
  .header-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--gold); }
  .header-logout {
    background: none; border: none; color: var(--text-dim); font-size: 13px;
    cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 6px 12px;
    border-radius: var(--radius-sm); transition: all 0.2s;
  }
  .header-logout:hover { color: var(--text); background: var(--bg-card); }
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex;
    background: rgba(17, 17, 17, 0.98); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border); z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 4px 8px; cursor: pointer; transition: all 0.2s;
    border: none; background: none; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; gap: 4px;
  }
  .nav-item.active { color: var(--gold); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .page { padding: 20px; max-width: 600px; margin: 0 auto; }
  .page-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: var(--gold); margin-bottom: 20px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat-card.wide { grid-column: 1 / -1; }
  .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--gold); }
  .stat-value.sm { font-size: 20px; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .feed-list { display: flex; flex-direction: column; gap: 8px; }
  .feed-item {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
    display: flex; gap: 10px; align-items: flex-start; cursor: pointer;
    transition: border-color 0.2s;
  }
  .feed-item:hover { border-color: var(--border-gold); }
  .feed-icon {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }
  .fi-pay { background: rgba(76, 175, 80, 0.15); }
  .fi-int { background: rgba(231, 76, 60, 0.15); }
  .fi-fine { background: rgba(231, 76, 60, 0.15); }
  .fi-spin { background: rgba(201, 168, 76, 0.15); }
  .fi-tok { background: rgba(91, 155, 213, 0.15); }
  .fi-dep { background: rgba(76, 175, 80, 0.15); }
  .fi-game { background: rgba(201, 168, 76, 0.15); }
  .fi-fee { background: rgba(136, 136, 136, 0.15); }
  .feed-body { flex: 1; min-width: 0; }
  .feed-text { font-size: 13px; line-height: 1.4; }
  .feed-text strong { color: var(--gold); font-weight: 600; }
  .feed-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .debtor-list { display: flex; flex-direction: column; gap: 8px; }
  .debtor-row {
    background: var(--bg-card); border: 1px solid var(--border);

  .debtor-avatar {
    width: 40px; height: 40px; border-radius: 50%;

    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-weight: 700;
    font-size: 14px; color: var(--gold); flex-shrink: 0;
  }
  .debtor-info { flex: 1; min-width: 0; }
  .debtor-name { font-size: 14px; font-weight: 600; }
  .debtor-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
  .debtor-balance { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; color: var(--gold); }
  .tb { font-size: 10px; padding: 2px 8px; border-radius: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; }
  .t-bronze { background: rgba(205, 127, 50, 0.15); color: #cd7f32; }
  .t-silver { background: rgba(192, 192, 192, 0.15); color: #c0c0c0; }
  .t-gold { background: rgba(201, 168, 76, 0.15); color: var(--gold); }
  .t-platinum { background: rgba(229, 228, 226, 0.15); color: #e5e4e2; }
  .t-diamond { background: rgba(185, 242, 255, 0.15); color: #b9f2ff; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; color: var(--gold); font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; padding: 4px 0; margin-bottom: 16px; }
  .detail-header { text-align: center; margin-bottom: 24px; }
  .detail-avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--gold-glow); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 22px; color: var(--gold); margin: 0 auto 12px; }
  .detail-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; }
  .detail-id { font-size: 12px; color: var(--text-dim); margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .detail-balance { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 700; color: var(--gold); margin-top: 12px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  .di { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
  .di-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .di-value { font-size: 14px; font-weight: 600; margin-top: 2px; }
  .fee-box { background: rgba(201, 168, 76, 0.08); border: 1px solid var(--border-gold); border-radius: var(--radius); padding: 14px; margin-bottom: 24px; }
  .fee-title { font-size: 12px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .fee-text { font-size: 13px; color: var(--text-dim); line-height: 1.5; white-space: pre-wrap; }
  .clause-box { background: rgba(91, 155, 213, 0.05); border: 1px solid rgba(91, 155, 213, 0.2); border-radius: var(--radius); padding: 14px; margin-bottom: 24px; }
  .clause-title { font-size: 12px; font-weight: 600; color: var(--blue); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .clause-text { font-size: 13px; color: var(--text-dim); line-height: 1.5; white-space: pre-wrap; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; overflow-x: auto; }
  .tab { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .tab.active { background: var(--gold); color: #0a0a0a; border-color: var(--gold); font-weight: 600; }
  .table-wrap { overflow-x: auto; margin: 0 -20px; padding: 0 20px; }
  .dt { width: 100%; border-collapse: collapse; font-size: 12px; }
  .dt th { text-align: left; padding: 8px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); border-bottom: 1px solid var(--border); white-space: nowrap; }
  .dt td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .amt-pos { color: var(--red); }
  .amt-neg { color: var(--green); }
  .et { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
  .et-payment { background: rgba(76, 175, 80, 0.15); color: var(--green); }
  .et-interest { background: rgba(231, 76, 60, 0.15); color: var(--red); }
  .et-fine { background: rgba(231, 76, 60, 0.15); color: var(--red); }
  .et-deposit { background: rgba(91, 155, 213, 0.15); color: var(--blue); }
  .et-debt-game { background: rgba(201, 168, 76, 0.15); color: var(--gold); }
  .et-wheel-spin { background: rgba(201, 168, 76, 0.15); color: var(--gold); }
  .et-admin-fee { background: rgba(136, 136, 136, 0.15); color: var(--text-dim); }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .fi, .fs, .ft { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  .fi:focus, .fs:focus, .ft:focus { border-color: var(--gold); }
  .fs { cursor: pointer; }
  .ft { resize: vertical; min-height: 80px; }
  .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .cb-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; }
  .cb-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--gold); cursor: pointer; }
  .preview-box { background: rgba(201, 168, 76, 0.05); border: 1px solid var(--border-gold); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .preview-title { font-size: 12px; font-weight: 600; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .preview-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
  .preview-row.total { border-top: 1px solid var(--border-gold); margin-top: 8px; padding-top: 8px; font-weight: 700; color: var(--gold); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; gap: 12px; color: var(--text-dim); font-size: 13px; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
  .search-bar { position: relative; margin-bottom: 16px; }
  .search-bar input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px 12px 40px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; }
  .search-bar input:focus { border-color: var(--gold); }
  .search-bar input::placeholder { color: var(--text-muted); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
  @media (max-width: 400px) { .stats-grid { grid-template-columns: 1fr; } .detail-grid { grid-template-columns: 1fr; } .stat-value { font-size: 24px; } }
</style>

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const SB_URL = 'https://lnpyrvpgycktwklkbiuf.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxucHlydnBneWNrdHdrbGtiaXVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mjg0NTksImV4cCI6MjA5MTIwNDQ1OX0.Pufq8ftE-bq4zI0iLV_UJWVgkopuPQmvNb197NAtbCA';

let token = null;

async function sf(ep, opts = {}) {
  const h = { 'Content-Type': 'application/json', 'apikey': SB_KEY, ...opts.headers };
  if (token) h['Authorization'] = `Bearer ${token}`;
  const r = await fetch(`${SB_URL}${ep}`, { ...opts, headers: h });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || e.msg || e.error_description || `HTTP ${r.status}`); }
  const t = await r.text();
  return t ? JSON.parse(t) : null;
}

const ADMIN_ID = 'bace4203-5ef4-4538-8c92-8e7cd13ba76c';

async function login(email, pw) {
  const d = await sf('/auth/v1/token?grant_type=password', { method: 'POST', body: JSON.stringify({ email, password: pw }) });
  if (d.user.id !== ADMIN_ID) throw new Error('Access denied — admin only');
  token = d.access_token;
  localStorage.setItem('te_at', d.access_token);
  localStorage.setItem('te_rt', d.refresh_token);
  return d;
}

async function refresh() {
  const rt = localStorage.getItem('te_rt');
  if (!rt) return false;
  try {
    const d = await sf('/auth/v1/token?grant_type=refresh_token', { method: 'POST', body: JSON.stringify({ refresh_token: rt }) });
    if (d.user.id !== ADMIN_ID) return false;
    token = d.access_token;
    localStorage.setItem('te_at', d.access_token);
    localStorage.setItem('te_rt', d.refresh_token);
    return true;
  } catch { return false; }
}

function logout() { token = null; localStorage.removeItem('te_at'); localStorage.removeItem('te_rt'); }

// Data fetchers
const getProfiles = () => sf('/rest/v1/profiles?select=*&debtor_number=not.eq.ADMIN&order=debtor_number.asc');
const getProfile = async (id) => { const d = await sf(`/rest/v1/profiles?id=eq.${id}&select=*`); return d?.[0]; };
const getLedger = (pid) => sf(`/rest/v1/ledger?profile_id=eq.${pid}&select=*&order=created_at.desc&limit=200`);
const getAllLedger = (n=80) => sf(`/rest/v1/ledger?select=*,profiles!inner(display_name,debtor_number)&order=created_at.desc&limit=${n}`);
const getTokenTx = (pid) => sf(`/rest/v1/token_transactions?profile_id=eq.${pid}&select=*&order=created_at.desc&limit=100`);
const getStips = async (pid) => { const d = await sf(`/rest/v1/stipulations?profile_id=eq.${pid}&select=*&limit=1`); return d?.[0]; };

const insertLedger = (e) => sf('/rest/v1/ledger', { method: 'POST', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify(e) });
const patchProfile = (id, d) => sf(`/rest/v1/profiles?id=eq.${id}`, { method: 'PATCH', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify({ ...d, updated_at: new Date().toISOString() }) });
const insertTokenTx = (e) => sf('/rest/v1/token_transactions', { method: 'POST', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify(e) });

// Helpers
function fmt(a) { return '£' + (parseFloat(a)||0).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtD(d) { return d ? new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '—'; }
function ago(d) { const s = (Date.now() - new Date(d).getTime()) / 1000; if (s<60) return 'Just now'; if (s<3600) return `${Math.floor(s/60)}m ago`; if (s<86400) return `${Math.floor(s/3600)}h ago`; if (s<604800) return `${Math.floor(s/86400)}d ago`; return fmtD(d); }
function tc(t) { if (!t) return ''; const l=t.toLowerCase(); if (l.includes('diamond')) return 't-diamond'; if (l.includes('platinum')) return 't-platinum'; if (l.includes('gold')) return 't-gold'; if (l.includes('silver')) return 't-silver'; return 't-bronze'; }
function ini(n) { return n ? n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?'; }
function calcTok(amt, wp, streak) { if (amt<=0) return 0; const b=Math.floor(amt/1.5); const m=streak>=4?1.5:1; let t=Math.floor(b*m); if (wp&&amt>wp) { const ex=amt-wp; const bb=Math.floor(ex/1.5); t+=Math.floor((Math.floor(bb*2)-bb)*m); } return t; }
function pj(v) { if (!v) return null; if (typeof v==='object') return v; try { return JSON.parse(v); } catch { return null; } }

function feeInfo(s) {
  if (!s) return null;
  const p = [];
  if (s.admin_fee) p.push(`Admin fee: ${s.admin_fee}`);
  if (s.late_fee) p.push(`Late fee: ${s.late_fee}`);
  const f = pj(s.fines_json);
  if (f) { if (Array.isArray(f)) f.forEach(x => p.push(typeof x==='string'?x:JSON.stringify(x))); else if (typeof f==='object') Object.entries(f).forEach(([k,v]) => p.push(`${k}: ${v}`)); }
  return p.length ? p.join('\n') : null;
}

function clauseInfo(s) {
  if (!s) return null;
  const c = pj(s.special_clauses_json);
  if (!c) return s.notes || null;
  if (Array.isArray(c)) return c.join('\n');
  if (typeof c==='object') return Object.entries(c).map(([k,v])=>`${k}: ${v}`).join('\n');
  return String(c);
}

// Components
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [ld, setLd] = useState(false);
  const [err, setErr] = useState('');
  const go = async (e) => { e.preventDefault(); setLd(true); setErr(''); try { await login(email, pw); onLogin(); } catch(e) { setErr(e.message); } setLd(false); };
  return (
    <div className="login-screen">
      <div className="login-crown">👑</div>
      <div className="login-title">Truee Empire</div>
      <div className="login-subtitle">Admin Panel</div>
      <form className="login-form" onSubmit={go}>
        <input type="email" placeholder="Admin email" value={email} onChange={e=>setEmail(e.target.value)} required autoComplete="email" />
        <input type="password" placeholder="Password" value={pw} onChange={e=>setPw(e.target.value)} required autoComplete="current-password" />
        {err && <div className="error-msg">{err}</div>}
        <button className="btn" type="submit" disabled={ld}>{ld ? <span className="spinner"/> : 'Sign In'}</button>
      </form>
    </div>
  );
}

function Feed({ items, onTap, limit=20 }) {
  if (!items?.length) return <div className="empty-state">No recent activity</div>;
  const ic = (t) => { const l=(t||'').toLowerCase(); if (l.includes('payment')) return {e:'💰',c:'fi-pay'}; if (l.includes('interest')) return {e:'📈',c:'fi-int'}; if (l.includes('fine')) return {e:'⚠️',c:'fi-fine'}; if (l.includes('spin')||l.includes('wheel')) return {e:'🎡',c:'fi-spin'}; if (l.includes('token')) return {e:'🪙',c:'fi-tok'}; if (l.includes('deposit')) return {e:'🏦',c:'fi-dep'}; if (l.includes('debt')||l.includes('game')) return {e:'🎮',c:'fi-game'}; if (l.includes('admin')) return {e:'📋',c:'fi-fee'}; return {e:'📝',c:'fi-pay'}; };
  return (
    <div className="feed-list">
      {items.slice(0,limit).map((it,i) => {
        const o=ic(it.entry_type); const nm=it.profiles?.display_name||'Unknown'; const dn=it.profiles?.debtor_number||'';
        const a=parseFloat(it.amount)||0; const ip=(it.entry_type||'').toLowerCase().includes('payment');
        return (
          <div className="feed-item" key={it.id||i} onClick={()=>it.profile_id&&onTap?.(it.profile_id)}>
            <div className={`feed-icon ${o.c}`}>{o.e}</div>
            <div className="feed-body">
              <div className="feed-text"><strong>{dn} {nm}</strong> — {it.entry_type}: {ip?'-':'+'}{fmt(Math.abs(a))}{it.description?` — ${it.description}`:''}</div>
              <div className="feed-time">{ago(it.created_at)}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Dashboard({ profiles, activity, onView }) {
  const tot = profiles.reduce((s,p)=>s+(parseFloat(p.current_balance)||0),0);
  const act = profiles.filter(p=>p.is_active!==false&&p.standing!=='inactive').length;
  const tok = profiles.reduce((s,p)=>s+(parseFloat(p.token_balance)||0),0);
  return (
    <div className="page">
      <div className="page-title">Empire Dashboard</div>
      <div className="stats-grid">
        <div className="stat-card wide"><div className="stat-label">Total Empire Debt</div><div className="stat-value">{fmt(tot)}</div></div>
        <div className="stat-card"><div className="stat-label">Active Debtors</div><div className="stat-value sm">{act}</div></div>
        <div className="stat-card"><div className="stat-label">Total Tokens</div><div className="stat-value sm">{tok}</div></div>
      </div>
      <div className="section-title">📋 Recent Activity</div>
      <Feed items={activity} onTap={onView} />
    </div>
  );
}

function DebtorList({ profiles, onView }) {
  const [q, setQ] = useState('');
  const fl = profiles.filter(p => { const s=q.toLowerCase(); return !s||(p.display_name||'').toLowerCase().includes(s)||(p.debtor_number||'').toLowerCase().includes(s); });
  return (
    <div className="page">
      <div className="page-title">Debtors</div>
      <div className="search-bar"><span className="search-icon">🔍</span><input placeholder="Search debtors..." value={q} onChange={e=>setQ(e.target.value)} /></div>
      <div className="debtor-list">
        {fl.map(p=>(
          <div className="debtor-row" key={p.id} onClick={()=>onView(p.id)}>
            <div className="debtor-avatar">{ini(p.display_name)}</div>
            <div className="debtor-info">
              <div className="debtor-name">{p.display_name||'Unnamed'}</div>
              <div className="debtor-meta">{p.debtor_number}{p.tier&&<span className={`tb ${tc(p.tier)}`}>{p.tier}</span>}</div>
            </div>
            <div className="debtor-balance">{fmt(p.current_balance)}</div>
          </div>
        ))}
        {fl.length===0&&<div className="empty-state">No debtors found</div>}
      </div>
    </div>
  );
}

function Detail({ pid, onBack }) {
  const [pr, setPr] = useState(null);
  const [lg, setLg] = useState([]);
  const [tk, setTk] = useState([]);
  const [st, setSt] = useState(null);
  const [ld, setLd] = useState(true);
  const [tab, setTab] = useState('ledger');

  useEffect(() => { (async()=>{ setLd(true); try { const [a,b,c,d]=await Promise.all([getProfile(pid),getLedger(pid),getTokenTx(pid),getStips(pid)]); setPr(a);setLg(b||[]);setTk(c||[]);setSt(d); } catch(e){console.error(e);} setLd(false); })(); }, [pid]);

  if (ld) return <div className="page"><div className="loading-screen"><div className="spinner"/><span>Loading...</span></div></div>;
  if (!pr) return <div className="page"><div className="error-msg">Not found</div></div>;

  const fr = feeInfo(st); const cl = clauseInfo(st);

  return (
    <div className="page">
      <button className="back-btn" onClick={onBack}>← Back</button>
      <div className="detail-header">
        <div className="detail-avatar">{ini(pr.display_name)}</div>
        <div className="detail-name">{pr.display_name}</div>
        <div className="detail-id">{pr.debtor_number}{pr.tier&&<span className={`tb ${tc(pr.tier)}`}>{pr.tier}</span>}</div>
        <div className="detail-balance">{fmt(pr.current_balance)}</div>
      </div>
      <div className="detail-grid">
        <div className="di"><div className="di-label">Weekly Payment</div><div className="di-value">{fmt(pr.weekly_payment)}</div></div>
        <div className="di"><div className="di-label">Payment Streak</div><div className="di-value">{pr.payment_streak||0} weeks</div></div>
        <div className="di"><div className="di-label">Token Balance</div><div className="di-value">🪙 {pr.token_balance||0}</div></div>
        <div className="di"><div className="di-label">Standing</div><div className="di-value">{pr.standing||'Active'}</div></div>
        <div className="di"><div className="di-label">Contract Total</div><div className="di-value">{fmt(pr.contract_total)}</div></div>
        <div className="di"><div className="di-label">Tokens Earned</div><div className="di-value">🪙 {pr.tokens_earned||0}</div></div>
        <div className="di"><div className="di-label">Fines Accrued</div><div className="di-value">{fmt(pr.fines_accrued)}</div></div>
        <div className="di"><div className="di-label">Compliance</div><div className="di-value">{pr.compliance_rating||'—'}</div></div>
        {pr.devotion_rank&&<div className="di"><div className="di-label">Devotion Rank</div><div className="di-value">{pr.devotion_rank}</div></div>}
        {pr.member_since&&<div className="di"><div className="di-label">Member Since</div><div className="di-value">{fmtD(pr.member_since)}</div></div>}
      </div>

      {fr&&<div className="fee-box"><div className="fee-title">💰 Fee & Fine Rules</div><div className="fee-text">{fr}</div></div>}
      {cl&&<div className="clause-box"><div className="clause-title">📜 Special Clauses</div><div className="clause-text">{cl}</div></div>}

      <div className="tabs">
        <button className={`tab ${tab==='ledger'?'active':''}`} onClick={()=>setTab('ledger')}>Ledger</button>
        <button className={`tab ${tab==='tokens'?'active':''}`} onClick={()=>setTab('tokens')}>Tokens</button>
        <button className={`tab ${tab==='contract'?'active':''}`} onClick={()=>setTab('contract')}>Contract</button>
      </div>

      {tab==='ledger'&&(
        <div className="table-wrap">{lg.length===0?<div className="empty-state">No transactions</div>:(
          <table className="dt"><thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Balance</th><th>Notes</th></tr></thead>
          <tbody>{lg.map((l,i)=>{const a=parseFloat(l.amount)||0;const ip=(l.entry_type||'').toLowerCase().includes('payment');const ec=`et-${(l.entry_type||'').toLowerCase().replace(/[\s_]+/g,'-')}`;
          return(<tr key={l.id||i}><td>{fmtD(l.entry_date||l.created_at)}</td><td><span className={`et ${ec}`}>{l.entry_type}</span></td><td className={ip?'amt-neg':'amt-pos'}>{ip?'-':'+'}{fmt(Math.abs(a))}</td><td style={{color:'var(--text-dim)'}}>{l.balance_after!=null?fmt(l.balance_after):'—'}</td><td style={{fontSize:'11px',color:'var(--text-dim)',maxWidth:'120px'}}>{l.description||'—'}</td></tr>);})}</tbody></table>
        )}</div>
      )}

      {tab==='tokens'&&(
        <div className="table-wrap">{tk.length===0?<div className="empty-state">No token transactions</div>:(
          <table className="dt"><thead><tr><th>Date</th><th>Tokens</th><th>Balance</th><th>Description</th></tr></thead>
          <tbody>{tk.map((t,i)=>(<tr key={t.id||i}><td>{fmtD(t.transaction_date||t.created_at)}</td><td style={{color:(t.amount||0)>=0?'var(--green)':'var(--red)'}}>{(t.amount||0)>=0?'+':''}{t.amount}</td><td style={{color:'var(--text-dim)'}}>{t.balance_after!=null?t.balance_after:'—'}</td><td style={{fontSize:'11px',color:'var(--text-dim)'}}>{t.description||'—'}</td></tr>))}</tbody></table>
        )}</div>
      )}

      {tab==='contract'&&st&&(
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          <div className="di"><div className="di-label">Weekly Payment</div><div className="di-value">{fmt(st.weekly_payment)}</div></div>
          <div className="di"><div className="di-label">Payment Day</div><div className="di-value">{st.payment_day||'—'}</div></div>
          <div className="di"><div className="di-label">Contract Value</div><div className="di-value">{fmt(st.contract_value)}</div></div>
          <div className="di"><div className="di-label">Deposit Paid</div><div className="di-value">{fmt(st.deposit_paid)}</div></div>
          <div className="di"><div className="di-label">Contract Start</div><div className="di-value">{fmtD(st.contract_start)}</div></div>
          <div className="di"><div className="di-label">Interest Wheel</div><div className="di-value">{st.interest_wheel||'—'}</div></div>
          <div className="di"><div className="di-label">High Interest Wheel</div><div className="di-value">{st.high_interest_wheel||'—'}</div></div>
          <div className="di"><div className="di-label">High Interest Threshold</div><div className="di-value">{st.high_interest_threshold||'—'}</div></div>
          <div className="di"><div className="di-label">Admin Fee</div><div className="di-value">{st.admin_fee||'—'}</div></div>
          <div className="di"><div className="di-label">Late Fee</div><div className="di-value">{st.late_fee||'—'}</div></div>
        </div>
      )}
      {tab==='contract'&&!st&&<div className="empty-state">No contract data</div>}
    </div>
  );
}

function AddTx({ profiles, onDone }) {
  const [sid, setSid] = useState('');
  const [type, setType] = useState('Payment');
  const [amt, setAmt] = useState('');
  const [pct, setPct] = useState('');
  const [notes, setNotes] = useState('');
  const [addFee, setAddFee] = useState(true);
  const [feeAmt, setFeeAmt] = useState('5');
  const [ld, setLd] = useState(false);
  const [ok, setOk] = useState('');
  const [err, setErr] = useState('');

  const pr = profiles.find(p=>p.id===sid);
  const bal = parseFloat(pr?.current_balance)||0;
  const isInt = type==='Interest';
  const ca = isInt ? (parseFloat(pct)/100)*bal : parseFloat(amt)||0;
  const fee = addFee ? (parseFloat(feeAmt)||0) : 0;
  const isPay = type==='Payment';
  const nb = isPay ? bal-ca+fee : bal+ca+fee;
  const te = isPay&&pr ? calcTok(ca, parseFloat(pr.weekly_payment)||0, pr.payment_streak||0) : 0;

  const go = async () => {
    if (!sid||ca<=0) { setErr('Fill in all fields with valid amounts'); return; }
    setLd(true); setErr(''); setOk('');
    try {
      const now = new Date().toISOString();
      await insertLedger({ profile_id:sid, entry_type:type, entry_date:now, amount:isPay?-ca:ca, balance_after:nb, description:notes||null, admin_fee:fee>0?fee:0, created_at:now, tokens_awarded:te>0?te:0 });
      await patchProfile(sid, { current_balance: nb });
      if (te>0) {
        const ct=parseFloat(pr.token_balance)||0; const ce=parseFloat(pr.tokens_earned)||0;
        await patchProfile(sid, { token_balance:ct+te, tokens_earned:ce+te });
        await insertTokenTx({ profile_id:sid, transaction_date:now, amount:te, balance_after:ct+te, description:`${te} tokens for ${fmt(ca)} payment`, created_at:now });
      }
      setOk(`✅ ${type} of ${fmt(ca)}${fee>0?` + ${fmt(fee)} fee`:''} recorded for ${pr.display_name}. New balance: ${fmt(nb)}${te>0?`. 🪙 ${te} tokens!`:''}`);
      setAmt(''); setPct(''); setNotes('');
      onDone?.();
    } catch(e) { setErr('Error: '+e.message); }
    setLd(false);
  };

  return (
    <div className="page">
      <div className="page-title">Add Transaction</div>
      <div className="form-group"><label className="form-label">Debtor</label>
        <select className="fs" value={sid} onChange={e=>{setSid(e.target.value);setOk('');}}>
          <option value="">Select debtor...</option>
          {profiles.map(p=>(<option key={p.id} value={p.id}>{p.debtor_number} — {p.display_name} ({fmt(p.current_balance)})</option>))}
        </select>
      </div>
      <div className="form-group"><label className="form-label">Type</label>
        <select className="fs" value={type} onChange={e=>setType(e.target.value)}>
          <option value="Payment">Payment (reduces balance)</option>
          <option value="Interest">Interest (% of balance)</option>
          <option value="Fine">Fine</option>
          <option value="Deposit">Deposit</option>
          <option value="Debt Game">Debt Game</option>
        </select>
      </div>
      {isInt ? (
        <div className="form-group"><label className="form-label">Interest %</label>
          <input className="fi" type="number" inputMode="decimal" placeholder="e.g. 25" value={pct} onChange={e=>setPct(e.target.value)} />
          {pr&&pct&&<div className="form-hint">{pct}% of {fmt(bal)} = {fmt(ca)}</div>}
        </div>
      ) : (
        <div className="form-group"><label className="form-label">Amount (£)</label>
          <input className="fi" type="number" inputMode="decimal" placeholder="0.00" value={amt} onChange={e=>setAmt(e.target.value)} />
        </div>
      )}
      <div className="form-group"><label className="form-label">Admin Fee</label>
        <label className="cb-row"><input type="checkbox" checked={addFee} onChange={e=>setAddFee(e.target.checked)} /><span>Add admin fee</span></label>
        {addFee&&<input className="fi" type="number" inputMode="decimal" placeholder="5.00" value={feeAmt} onChange={e=>setFeeAmt(e.target.value)} style={{marginTop:'8px'}} />}
        <div className="form-hint">Fee adds to balance. Check debtor profile for complex fee rules.</div>
      </div>
      <div className="form-group"><label className="form-label">Notes (optional)</label>
        <textarea className="ft" placeholder="Any notes..." value={notes} onChange={e=>setNotes(e.target.value)} />
      </div>
      {sid&&ca>0&&(
        <div className="preview-box">
          <div className="preview-title">Preview</div>
          <div className="preview-row"><span>Current Balance</span><span>{fmt(bal)}</span></div>
          <div className="preview-row"><span>{type}</span><span style={{color:isPay?'var(--green)':'var(--red)'}}>{isPay?'-':'+'}{fmt(ca)}</span></div>
          {fee>0&&<div className="preview-row"><span>Admin Fee</span><span style={{color:'var(--red)'}}>+{fmt(fee)}</span></div>}
          {te>0&&<div className="preview-row"><span>Tokens Earned</span><span style={{color:'var(--blue)'}}>🪙 +{te}</span></div>}
          <div className="preview-row total"><span>New Balance</span><span>{fmt(nb)}</span></div>
        </div>
      )}
      {err&&<div className="error-msg" style={{marginBottom:'12px'}}>{err}</div>}
      {ok&&<div className="success-msg" style={{marginBottom:'12px'}}>{ok}</div>}
      <button className="btn" onClick={go} disabled={ld} style={{width:'100%'}}>{ld?<span className="spinner"/>:'Submit Transaction'}</button>
    </div>
  );
}

function App() {
  const [auth, setAuth] = useState(false);
  const [chk, setChk] = useState(true);
  const [pg, setPg] = useState('dashboard');
  const [profs, setProfs] = useState([]);
  const [act, setAct] = useState([]);
  const [sel, setSel] = useState(null);
  const [dl, setDl] = useState(false);

  useEffect(() => { (async()=>{ if(await refresh()) setAuth(true); setChk(false); })(); }, []);

  const load = useCallback(async () => {
    setDl(true);
    try { const [p,a] = await Promise.all([getProfiles(), getAllLedger(100)]); setProfs(p||[]); setAct(a||[]); } catch(e) { console.error(e); }
    setDl(false);
  }, []);

  useEffect(() => { if(auth) load(); }, [auth, load]);

  const vd = (id) => { setSel(id); setPg('detail'); };
  const lo = () => { logout(); setAuth(false); setProfs([]); setAct([]); };

  if (chk) return <div className="login-screen"><div className="spinner"/></div>;
  if (!auth) return <LoginScreen onLogin={()=>setAuth(true)} />;

  return (
    <div className="app-shell">
      <header className="header">
        <div className="header-brand"><span className="header-crown">👑</span><span className="header-title">Truee Empire</span></div>
        <button className="header-logout" onClick={lo}>Sign Out</button>
      </header>
      {dl&&profs.length===0 ? <div className="loading-screen" style={{minHeight:'60vh'}}><div className="spinner"/><span>Loading empire data...</span></div> : <>
        {pg==='dashboard'&&<Dashboard profiles={profs} activity={act} onView={vd} />}
        {pg==='debtors'&&<DebtorList profiles={profs} onView={vd} />}
        {pg==='detail'&&<Detail pid={sel} onBack={()=>setPg('debtors')} />}
        {pg==='add'&&<AddTx profiles={profs} onDone={load} />}
        {pg==='activity'&&<div className="page"><div className="page-title">Activity Feed</div><Feed items={act} onTap={vd} limit={100} /></div>}
      </>}
      <nav className="bottom-nav">
        <button className={`nav-item ${pg==='dashboard'?'active':''}`} onClick={()=>setPg('dashboard')}><span className="nav-icon">📊</span><span className="nav-label">Home</span></button>
        <button className={`nav-item ${pg==='debtors'||pg==='detail'?'active':''}`} onClick={()=>setPg('debtors')}><span className="nav-icon">👥</span><span className="nav-label">Debtors</span></button>
        <button className={`nav-item ${pg==='add'?'active':''}`} onClick={()=>setPg('add')}><span className="nav-icon">➕</span><span className="nav-label">Add</span></button>
        <button className={`nav-item ${pg==='activity'?'active':''}`} onClick={()=>setPg('activity')}><span className="nav-icon">📋</span><span className="nav-label">Feed</span></button>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
