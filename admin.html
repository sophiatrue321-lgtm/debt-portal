<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Truee Empire — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-card: #111111;
    --bg-card-hover: #1a1a1a;
    --bg-input: #161616;
    --gold: #c9a84c;
    --gold-dim: #a8893d;
    --gold-glow: rgba(201, 168, 76, 0.15);
    --gold-glow-strong: rgba(201, 168, 76, 0.3);
    --text: #e8e8e8;
    --text-dim: #888888;
    --text-muted: #555555;
    --green: #4caf50;
    --red: #e74c3c;
    --blue: #5b9bd5;
    --border: #222222;
    --border-gold: rgba(201, 168, 76, 0.3);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 4px; }
  .login-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 24px;
  }
  .login-crown { font-size: 48px; margin-bottom: 16px; }
  .login-title {
    font-family: 'Cormorant Garamond', serif; font-size: 28px;
    font-weight: 600; color: var(--gold); margin-bottom: 4px;
  }
  .login-subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 32px; }
  .login-form { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; }
  .login-form input {
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px; color: var(--text);
    font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none;
    transition: border-color 0.2s;
  }
  .login-form input:focus { border-color: var(--gold); }
  .login-form input::placeholder { color: var(--text-muted); }
  .btn {
    background: var(--gold); color: #0a0a0a; border: none;
    border-radius: var(--radius-sm); padding: 14px 24px; font-size: 15px;
    font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer;
    transition: all 0.2s; text-align: center;
  }
  .btn:hover { background: #d4b35a; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-sm { padding: 8px 16px; font-size: 13px; }
  .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
  .btn-outline:hover { background: var(--gold-glow); }
  .btn-danger { background: var(--red); }
  .btn-danger:hover { background: #c0392b; }
  .error-msg {
    background: rgba(231, 76, 60, 0.1); border: 1px solid rgba(231, 76, 60, 0.3);
    color: var(--red); padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 13px; text-align: center;
  }
  .success-msg {
    background: rgba(76, 175, 80, 0.1); border: 1px solid rgba(76, 175, 80, 0.3);
    color: var(--green); padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 13px; text-align: center;
  }
  .app-shell { min-height: 100vh; padding-bottom: 80px; }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(12px); z-index: 100;
  }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .header-crown { font-size: 24px; }
  .header-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--gold); }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .header-btn {
    background: none; border: none; color: var(--text-dim); font-size: 18px;
    cursor: pointer; padding: 6px; border-radius: var(--radius-sm); transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .header-btn:hover { color: var(--text); background: var(--bg-card); }
  .header-btn.active { color: var(--gold); }
  .header-logout {
    background: none; border: none; color: var(--text-dim); font-size: 13px;
    cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 6px 12px;
    border-radius: var(--radius-sm); transition: all 0.2s;
  }
  .header-logout:hover { color: var(--text); background: var(--bg-card); }
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex;
    background: rgba(17, 17, 17, 0.98); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border); z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 4px 8px; cursor: pointer; transition: all 0.2s;
    border: none; background: none; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; gap: 4px;
  }
  .nav-item.active { color: var(--gold); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .page { padding: 20px; max-width: 600px; margin: 0 auto; }
  .page-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: var(--gold); margin-bottom: 20px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat-card.wide { grid-column: 1 / -1; }
  .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--gold); }
  .stat-value.sm { font-size: 20px; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .feed-list { display: flex; flex-direction: column; gap: 8px; }
  .feed-item {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
    display: flex; gap: 10px; align-items: flex-start; cursor: pointer;
    transition: border-color 0.2s;
  }
  .feed-item:hover { border-color: var(--border-gold); }
  .feed-icon {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }
  .fi-pay { background: rgba(76, 175, 80, 0.15); }
  .fi-int { background: rgba(231, 76, 60, 0.15); }
  .fi-fine { background: rgba(231, 76, 60, 0.15); }
  .fi-spin { background: rgba(201, 168, 76, 0.15); }
  .fi-tok { background: rgba(91, 155, 213, 0.15); }
  .fi-dep { background: rgba(76, 175, 80, 0.15); }
  .fi-game { background: rgba(201, 168, 76, 0.15); }
  .fi-fee { background: rgba(136, 136, 136, 0.15); }
  .feed-body { flex: 1; min-width: 0; }
  .feed-text { font-size: 13px; line-height: 1.4; }
  .feed-text strong { color: var(--gold); font-weight: 600; }
  .feed-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .debtor-list { display: flex; flex-direction: column; gap: 8px; }
  .debtor-row {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .debtor-row:hover { border-color: var(--border-gold); background: var(--bg-card-hover); }
  .debtor-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--gold-glow); border: 1px solid var(--border-gold);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-weight: 700;
    font-size: 14px; color: var(--gold); flex-shrink: 0;
  }
  .debtor-info { flex: 1; min-width: 0; }
  .debtor-name { font-size: 14px; font-weight: 600; }
  .debtor-username { font-size: 11px; color: var(--text-muted); font-style: italic; }
  .debtor-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .debtor-contract-info { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; }
  .debtor-contract-info span { display: flex; align-items: center; gap: 3px; }
  .debtor-balance { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; color: var(--gold); text-align: right; }
  .debtor-weekly { font-size: 10px; color: var(--text-dim); text-align: right; margin-top: 2px; }
  .tb { font-size: 10px; padding: 2px 8px; border-radius: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; }
  .t-bronze { background: rgba(205, 127, 50, 0.15); color: #cd7f32; }
  .t-silver { background: rgba(192, 192, 192, 0.15); color: #c0c0c0; }
  .t-gold { background: rgba(201, 168, 76, 0.15); color: var(--gold); }
  .t-platinum { background: rgba(229, 228, 226, 0.15); color: #e5e4e2; }
  .t-diamond { background: rgba(185, 242, 255, 0.15); color: #b9f2ff; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; color: var(--gold); font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; padding: 4px 0; margin-bottom: 16px; }
  .detail-header { text-align: center; margin-bottom: 24px; }
  .detail-avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--gold-glow); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 22px; color: var(--gold); margin: 0 auto 12px; }
  .detail-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; }
  .detail-username { font-size: 13px; color: var(--text-muted); font-style: italic; margin-top: 2px; }
  .detail-id { font-size: 12px; color: var(--text-dim); margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .detail-balance { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 700; color: var(--gold); margin-top: 12px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  .di { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
  .di-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .di-value { font-size: 14px; font-weight: 600; margin-top: 2px; }
  .fee-box { background: rgba(201, 168, 76, 0.08); border: 1px solid var(--border-gold); border-radius: var(--radius); padding: 14px; margin-bottom: 24px; }
  .fee-title { font-size: 12px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .fee-text { font-size: 13px; color: var(--text-dim); line-height: 1.5; white-space: pre-wrap; }
  .clause-box { background: rgba(91, 155, 213, 0.05); border: 1px solid rgba(91, 155, 213, 0.2); border-radius: var(--radius); padding: 14px; margin-bottom: 24px; }
  .clause-title { font-size: 12px; font-weight: 600; color: var(--blue); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .clause-text { font-size: 13px; color: var(--text-dim); line-height: 1.5; white-space: pre-wrap; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; overflow-x: auto; }
  .tab { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .tab.active { background: var(--gold); color: #0a0a0a; border-color: var(--gold); font-weight: 600; }
  .table-wrap { overflow-x: auto; margin: 0 -20px; padding: 0 20px; }
  .dt { width: 100%; border-collapse: collapse; font-size: 12px; }
  .dt th { text-align: left; padding: 8px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); border-bottom: 1px solid var(--border); white-space: nowrap; }
  .dt td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .amt-pos { color: var(--red); }
  .amt-neg { color: var(--green); }
  .et { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
  .et-payment { background: rgba(76, 175, 80, 0.15); color: var(--green); }
  .et-interest { background: rgba(231, 76, 60, 0.15); color: var(--red); }
  .et-fine { background: rgba(231, 76, 60, 0.15); color: var(--red); }
  .et-deposit { background: rgba(91, 155, 213, 0.15); color: var(--blue); }
  .et-debt-game { background: rgba(201, 168, 76, 0.15); color: var(--gold); }
  .et-wheel-spin { background: rgba(201, 168, 76, 0.15); color: var(--gold); }
  .et-admin-fee { background: rgba(136, 136, 136, 0.15); color: var(--text-dim); }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .fi, .fs, .ft { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  .fi:focus, .fs:focus, .ft:focus { border-color: var(--gold); }
  .fs { cursor: pointer; }
  .ft { resize: vertical; min-height: 80px; }
  .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .cb-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; }
  .cb-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--gold); cursor: pointer; }
  .preview-box { background: rgba(201, 168, 76, 0.05); border: 1px solid var(--border-gold); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .preview-title { font-size: 12px; font-weight: 600; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .preview-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
  .preview-row.total { border-top: 1px solid var(--border-gold); margin-top: 8px; padding-top: 8px; font-weight: 700; color: var(--gold); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; gap: 12px; color: var(--text-dim); font-size: 13px; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
  .search-bar { position: relative; margin-bottom: 16px; }
  .search-bar input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px 12px 40px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; }
  .search-bar input:focus { border-color: var(--gold); }
  .search-bar input::placeholder { color: var(--text-muted); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }

  /* === ALERTS / NOTIFICATIONS === */
  .alert-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .alert-item {
    background: rgba(231, 76, 60, 0.08); border: 1px solid rgba(231, 76, 60, 0.25);
    border-radius: var(--radius-sm); padding: 12px 14px;
    display: flex; gap: 10px; align-items: flex-start;
    font-size: 13px; line-height: 1.4; cursor: pointer;
    transition: border-color 0.2s;
  }
  .alert-item:hover { border-color: rgba(231, 76, 60, 0.5); }
  .alert-item.warn {
    background: rgba(255, 193, 7, 0.08); border-color: rgba(255, 193, 7, 0.25);
  }
  .alert-item.warn:hover { border-color: rgba(255, 193, 7, 0.5); }
  .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .alert-text { flex: 1; }
  .alert-text strong { color: var(--gold); }

  /* === DEBTOR RULES INFO BOX (on Add Transaction) === */
  .rules-box {
    background: rgba(201, 168, 76, 0.06); border: 1px solid var(--border-gold);
    border-radius: var(--radius); padding: 14px; margin-bottom: 16px;
  }
  .rules-box .rules-title {
    font-size: 12px; font-weight: 600; color: var(--gold); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 10px;
  }
  .rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .rules-grid .di { padding: 8px 10px; }

  /* === WHEEL === */
  .wheel-container { display: flex; flex-direction: column; align-items: center; margin: 20px 0; }
  .wheel-svg { filter: drop-shadow(0 0 20px rgba(201, 168, 76, 0.2)); }
  .wheel-result {
    margin-top: 16px; text-align: center; padding: 16px;
    background: var(--gold-glow); border: 1px solid var(--border-gold);
    border-radius: var(--radius); width: 100%;
  }
  .wheel-result-pct {
    font-family: 'Cormorant Garamond', serif; font-size: 48px;
    font-weight: 700; color: var(--gold);
  }
  .wheel-result-amt { font-size: 14px; color: var(--text-dim); margin-top: 4px; }
  .wheel-btn {
    background: linear-gradient(135deg, var(--gold), #d4b35a);
    color: #0a0a0a; border: none; border-radius: var(--radius-sm);
    padding: 14px 32px; font-size: 16px; font-weight: 700;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    margin-top: 16px; transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
  }
  .wheel-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(201, 168, 76, 0.4); }
  .wheel-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* === WHEEL MODE TABS === */
  .wheel-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .wheel-tab {
    flex: 1; padding: 10px 8px; border-radius: var(--radius-sm); font-size: 12px;
    font-weight: 600; cursor: pointer; white-space: nowrap; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); font-family: 'DM Sans', sans-serif;
    transition: all 0.2s; text-align: center; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .wheel-tab.active { background: var(--gold); color: #0a0a0a; border-color: var(--gold); }

  /* === PRESET CHIPS === */
  .preset-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .preset-chip {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    cursor: pointer; transition: all 0.2s;
  }
  .preset-chip:hover { border-color: var(--border-gold); }
  .preset-chip.selected { border-color: var(--gold); background: var(--gold-glow); }
  .preset-name { font-size: 13px; font-weight: 600; }
  .preset-vals { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .preset-del { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 4px; }
  .preset-del:hover { color: var(--red); }

  /* === SETTINGS === */
  .settings-section {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  }
  .settings-title {
    font-family: 'Cormorant Garamond', serif; font-size: 18px;
    font-weight: 600; color: var(--text); margin-bottom: 16px;
  }

  /* === CUSTOM WHEEL INPUTS === */
  .cw-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .cw-row input { flex: 1; }
  .cw-add { background: none; border: 1px dashed var(--border-gold); color: var(--gold); border-radius: var(--radius-sm); padding: 10px; cursor: pointer; width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13px; transition: all 0.2s; margin-bottom: 8px; }
  .cw-add:hover { background: var(--gold-glow); }
  .cw-del { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 4px 8px; flex-shrink: 0; }
  .cw-del:hover { color: var(--red); }

  /* === BADGE for notification count === */
  .badge {
    background: var(--red); color: white; font-size: 10px; font-weight: 700;
    min-width: 16px; height: 16px; border-radius: 8px; display: flex;
    align-items: center; justify-content: center; padding: 0 4px;
    position: absolute; top: -2px; right: -2px;
  }
  .nav-item { position: relative; }

// Helpers
function fmt(a) { return '£' + (parseFloat(a)||0).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtD(d) { return d ? new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '—'; }
function ago(d) { const s = (Date.now() - new Date(d).getTime()) / 1000; if (s<60) return 'Just now'; if (s<3600) return `${Math.floor(s/60)}m ago`; if (s<86400) return `${Math.floor(s/3600)}h ago`; if (s<604800) return `${Math.floor(s/86400)}d ago`; return fmtD(d); }
function tc(t) { if (!t) return ''; const l=t.toLowerCase(); if (l.includes('diamond')) return 't-diamond'; if (l.includes('platinum')) return 't-platinum'; if (l.includes('gold')) return 't-gold'; if (l.includes('silver')) return 't-silver'; return 't-bronze'; }
function ini(n) { return n ? n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?'; }
function calcTok(amt, wp, streak) { if (amt<=0) return 0; const b=Math.floor(amt/1.5); const m=streak>=4?1.5:1; let t=Math.floor(b*m); if (wp&&amt>wp) { const ex=amt-wp; const bb=Math.floor(ex/1.5); t+=Math.floor((Math.floor(bb*2)-bb)*m); } return t; }
  // ========== WEEK HELPERS ==========
function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() - day);
  d.setHours(0, 0, 0, 0);
  return d;
}

function getWeekEnd(date) {
  const start = getWeekStart(date);
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  end.setHours(23, 59, 59, 999);
  return end;
}

function calcWeeklyPaid(profileId, ledgerItems, weekStartDate) {
  const weekStart = weekStartDate || getWeekStart(new Date());
  const weekEnd = getWeekEnd(weekStart);
  return ledgerItems
    .filter(a => a.profile_id === profileId
      && (a.entry_type||'').toLowerCase().includes('payment')
      && new Date(a.created_at) >= weekStart
      && new Date(a.created_at) <= weekEnd)
    .reduce((sum, a) => sum + Math.abs(parseFloat(a.amount) || 0), 0);
}
  
function pj(v) { if (!v) return null; if (typeof v==='object') return v; try { return JSON.parse(v); } catch { return null; } }

function feeInfo(s) {
  if (!s) return null;
  const p = [];
  if (s.admin_fee) p.push(`Admin fee: ${s.admin_fee}`);
  if (s.late_fee) p.push(`Late fee: ${s.late_fee}`);
  const f = pj(s.fines_json);
  if (f) {
    if (Array.isArray(f)) {
      f.forEach(x => {
        if (typeof x === 'string') p.push(x);
        else if (typeof x === 'object' && x !== null) {
          // Format objects like {name:"Trapped Tax", amount:"Discretionary", detail:"..."}
          const name = x.name || x.fine || x.type || 'Fine';
          const amount = x.amount || x.value || '';
          const detail = x.detail || x.trigger || x.description || '';
          let line = `${name}`;
          if (amount) line += ` — ${amount}`;
          if (detail && detail !== amount) line += ` (${detail})`;
          p.push(line);
        } else p.push(String(x));
      });
    } else if (typeof f === 'object') {
      Object.entries(f).forEach(([k,v]) => p.push(`${k}: ${v}`));
    }
  }
  return p.length ? p.join('\n') : null;
}

function clauseInfo(s) {
  if (!s) return null;
  const c = pj(s.special_clauses_json);
  if (!c) return s.notes || null;
  if (Array.isArray(c)) return c.map(x => {
    if (typeof x === 'string') return x;
    if (typeof x === 'object' && x !== null) {
      // Handle objects like {clause: "...", detail: "..."}
      const vals = Object.values(x).filter(v => v && v !== 'null');
      return vals.join(' — ');
    }
    return String(x);
  }).join('\n');
  if (typeof c==='object') return Object.entries(c).map(([k,v])=>`${k}: ${v}`).join('\n');
  return String(c);
}

// ========== NOTIFICATION ENGINE ==========
function generateAlerts(profiles, stips, activity) {
  const alerts = [];
  const today = new Date();
  const dayNames = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const todayName = dayNames[today.getDay()];

  profiles.forEach(p => {
    if (p.is_active === false || p.standing === 'inactive') return;
    const st = stips.find(s => s.profile_id === p.id);
    if (!st) return;

    // Check late payment: if payment_day matches today or has passed this week
    if (st.payment_day) {
      const pd = st.payment_day.toLowerCase().trim();
      // Find last payment in activity for this debtor
      const lastPay = activity.find(a => a.profile_id === p.id && (a.entry_type||'').toLowerCase().includes('payment'));
      const lastPayDate = lastPay ? new Date(lastPay.created_at) : null;
      const daysSinceLastPay = lastPayDate ? (today - lastPayDate) / (1000*60*60*24) : 999;

      if (daysSinceLastPay > 7) {
        alerts.push({
          type: 'danger',
          icon: '🚨',
          text: `<strong>${p.debtor_number} ${p.display_name}</strong> — payment overdue! Last payment was ${lastPayDate ? Math.floor(daysSinceLastPay) + ' days ago' : 'never'}. Due: ${st.payment_day}.`,           
          pid: p.id,           
          key: `overdue_${p.debtor_number}`
        });
      }
    }

    // Check fine review date
    if (st.fine_review_date) {
      const frd = new Date(st.fine_review_date);
      if (frd <= today) {
        const daysOverdue = Math.floor((today - frd) / (1000*60*60*24));
        alerts.push({
          type: 'warn',
          icon: '⚠️',
          text: `<strong>${p.debtor_number} ${p.display_name}</strong> — fine review date ${daysOverdue === 0 ? 'is today' : 'was ' + daysOverdue + ' day(s) ago'}. Review fines and update.`,
          pid: p.id,
          key: `fine_review_${p.debtor_number}`
        });
      }
    }

    // Check if balance is very high (e.g. over contract_total)
    const bal = parseFloat(p.current_balance) || 0;
    const ct = parseFloat(st.contract_value) || 0;
    if (ct > 0 && bal > ct * 1.5) {
      alerts.push({
        type: 'warn',
        icon: '📈',
        text: `<strong>${p.debtor_number} ${p.display_name}</strong> — balance (${fmt(bal)}) exceeds 150% of contract value (${fmt(ct)}).`,
          pid: p.id,
          key: `high_balance_${p.debtor_number}`
      });
    }
  });
// Check for 300+ weekly payment clause trigger
    // If a debtor has a clause mentioning 300+ paid in a week,
    // check if they've actually paid 300+ this week (Sun-Sat)
    profiles.forEach(p => {
      if (p.is_active === false || p.standing === 'inactive') return;
      const st = stips.find(s => s.profile_id === p.id);
      if (!st) return;
 
      // Check if they have a 300+ clause
      const clauseStr = JSON.stringify(st.special_clauses_json || '') + JSON.stringify(st.fines_json || '') + (st.notes || '');
      const has300clause = /300\+?\s*(paid|in a week|weekly|per week|paid off)/i.test(clauseStr) || /more than\s*\$?£?300/i.test(clauseStr);
      if (!has300clause) return;
 
      const weekTotal = calcWeeklyPaid(p.id, activity);
 
      if (weekTotal >= 300) {
        alerts.push({
          type: 'warn',
          icon: '🎡',
          text: `<strong>${p.debtor_number} ${p.display_name}</strong> — paid <strong>${fmt(weekTotal)}</strong> this week (Sun-Sat). 300+ clause triggered — additional wheel spin due!`,
          pid: p.id,
          key: `clause_300_${p.debtor_number}`
        });
      }
    });
  return alerts;
}

// ========== PARSE WHEEL STRING ==========
function parseWheelStr(str) {
  if (!str) return null;
  const nums = [];
  const pctMatches = str.match(/(\d+(?:\.\d+)?)\s*%/g);
  if (pctMatches && pctMatches.length > 1) {
    pctMatches.forEach(function(m) { nums.push(parseFloat(m)); });
    const unique = [...new Set(nums)].sort(function(a, b) { return a - b; });
    return unique;
  }
  const rangeMatch = str.match(/(\d+)\s*[-–—]\s*(\d+)\s*%/);
  if (rangeMatch) {
    const lo = parseInt(rangeMatch[1]);
    const hi = parseInt(rangeMatch[2]);
    let step;
    if (hi <= 30) step = 5;
    else if (hi <= 100) step = 10;
    else step = 10;
    for (let i = lo; i <= hi; i += step) nums.push(i);
    return nums;
  }
  if (pctMatches && pctMatches.length === 1) {
    return [parseFloat(pctMatches[0])];
  }
  return null;
}

// ========== LOW WHEEL SPIN TRACKER ==========
function LowWheelTracker({ st, pid }) {
  const [used, setUsed] = useState(st?.low_wheel_spins_used || 0);
  const [saving, setSaving] = useState(false);
  // Parse total available from the interest_wheel or high_interest_wheel text
  // Look for patterns like "2 low interest wheel spins" or "1 opportunity"
  const parseTotal = () => {
    const texts = [st?.interest_wheel || '', st?.high_interest_wheel || '', st?.special_clauses_json || ''];
    const combined = texts.join(' ').toLowerCase();
    const match = combined.match(/(\d+)\s*(?:low\s*(?:interest\s*)?wheel\s*spin|opportunit)/i);
    if (match) return parseInt(match[1]);
    // Also check for "ONE" written out
    if (combined.includes('one low') || combined.includes('1 low')) return 1;
    if (combined.includes('two low') || combined.includes('2 low')) return 2;
    return 0;
  };
  const total = parseTotal();
  if (total === 0) return null; // No low wheel clause for this debtor

  const updateUsed = async (newVal) => {
    if (newVal < 0 || newVal > total) return;
    setSaving(true);
    try {
      await sf(`/rest/v1/stipulations?profile_id=eq.${pid}`, {
        method: 'PATCH',
        headers: { 'Prefer': 'return=representation' },
        body: JSON.stringify({ low_wheel_spins_used: newVal, updated_at: new Date().toISOString() })
      });
      setUsed(newVal);
    } catch(e) { console.error('Failed to update low wheel spins:', e); }
    setSaving(false);
  };

  return (
    <div className="di" style={{background:'rgba(201,168,76,0.06)',border:'1px solid var(--border-gold)'}}>
      <div className="di-label">Low Interest Wheel Spins</div>
      <div style={{display:'flex',alignItems:'center',gap:'12px',marginTop:'6px'}}>
        <div style={{display:'flex',gap:'4px'}}>
          {Array.from({length: total}, (_,i) => (
            <div key={i} style={{
              width:'28px',height:'28px',borderRadius:'50%',
              background: i < used ? 'var(--gold)' : 'var(--bg-input)',
              border: '2px solid ' + (i < used ? 'var(--gold)' : 'var(--border-gold)'),
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:'12px',color: i < used ? '#0a0a0a' : 'var(--text-muted)',fontWeight:700
            }}>
              {i < used ? '✓' : i+1}
            </div>
          ))}
        </div>
        <span style={{fontSize:'13px',color:'var(--text-dim)'}}>{used} / {total} used</span>
        <div style={{marginLeft:'auto',display:'flex',gap:'4px'}}>
          <button className="btn btn-sm btn-outline" style={{padding:'4px 10px',fontSize:'12px'}} onClick={()=>updateUsed(used+1)} disabled={saving||used>=total}>+1</button>
          <button className="btn btn-sm btn-outline" style={{padding:'4px 10px',fontSize:'12px'}} onClick={()=>updateUsed(used-1)} disabled={saving||used<=0}>−1</button>
        </div>
      </div>
    </div>
  );
}

// ========== SPINNING WHEEL COMPONENT ==========
function SpinWheel({ segments, onResult, balance }) {
  const [spinning, setSpinning] = useState(false);
  const [rotation, setRotation] = useState(0);
  const [result, setResult] = useState(null);
  const canvasRef = useRef(null);

  const segCount = segments.length;
  const segAngle = 360 / segCount;

  const doSpin = () => {
    if (spinning || segCount === 0) return;
    setSpinning(true);
    setResult(null);

    const winIdx = Math.floor(Math.random() * segCount);
    const segMid = winIdx * segAngle + segAngle / 2;
    const spins = 5 + Math.floor(Math.random() * 5);
    // Calculate target: full spins + position to land this segment at top
    const target = spins * 360 + (360 - segMid);
    // Add to current rotation, but normalize current rotation first
    const currentNorm = rotation % 360;
    const finalRotation = rotation - currentNorm + target;
    setRotation(finalRotation);

    setTimeout(() => {
      const pct = segments[winIdx];
      const amt = balance ? (pct / 100) * balance : 0;
      const resultData = { pct, amt, idx: winIdx, segments };
      setResult(resultData);
      setSpinning(false);
      onResult?.(pct, resultData);
    }, 4000);
  };

  return (
    <div className="wheel-container">
      <div style={{position:'relative',display:'inline-block'}}>
        {/* Pointer */}
        <div style={{position:'absolute',top:'-12px',left:'50%',transform:'translateX(-50%)',zIndex:10,fontSize:'24px',filter:'drop-shadow(0 2px 4px rgba(0,0,0,0.5))'}}>▼</div>
        <svg className="wheel-svg" width="280" height="280" viewBox="0 0 280 280" style={{transform:`rotate(${rotation}deg)`,transition:spinning?'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)':'none'}}>
          {segments.map((seg, i) => {
            const startAngle = (i * segAngle - 90) * (Math.PI / 180);
            const endAngle = ((i + 1) * segAngle - 90) * (Math.PI / 180);
            const x1 = 140 + 130 * Math.cos(startAngle);
            const y1 = 140 + 130 * Math.sin(startAngle);
            const x2 = 140 + 130 * Math.cos(endAngle);
            const y2 = 140 + 130 * Math.sin(endAngle);
            const largeArc = segAngle > 180 ? 1 : 0;
            const midAngle = ((i + 0.5) * segAngle - 90) * (Math.PI / 180);
            const labelR = segCount > 14 ? 95 : 85;
            const tx = 140 + labelR * Math.cos(midAngle);
            const ty = 140 + labelR * Math.sin(midAngle);
            const textRotate = (i + 0.5) * segAngle;
            return (
              <g key={i}>
                <path d={`M140,140 L${x1},${y1} A130,130 0 ${largeArc},1 ${x2},${y2} Z`}
                  fill={WHEEL_COLORS[i % WHEEL_COLORS.length]}
                  stroke="#0a0a0a" strokeWidth="2" />
                <text x={tx} y={ty} textAnchor="middle" dominantBaseline="middle"
                  fill="#0a0a0a" fontSize={segCount > 14 ? "9" : segCount > 8 ? "11" : "14"} fontWeight="700" fontFamily="DM Sans"
                  transform={`rotate(${textRotate},${tx},${ty})`}>
                  {seg}%
                </text>
              </g>
            );
          })}
          <circle cx="140" cy="140" r="20" fill="#0a0a0a" stroke="var(--gold)" strokeWidth="3" />
          <text x="140" y="140" textAnchor="middle" dominantBaseline="middle" fill="var(--gold)" fontSize="10" fontWeight="700" fontFamily="DM Sans">SPIN</text>
        </svg>
      </div>

      <button className="wheel-btn" onClick={doSpin} disabled={spinning || segCount===0}>
        {spinning ? '🎰 Spinning...' : '🎡 Spin the Wheel'}
      </button>

      {result && (
        <div className="wheel-result">
          <div className="wheel-result-pct">{result.pct}%</div>
          {balance > 0 && <div className="wheel-result-amt">{result.pct}% of {fmt(balance)} = {fmt(result.amt)}</div>}
        </div>
      )}
    </div>
  );
}

    if (resultData) setLastWheelData(resultData);
  };

    if (!newPresetName.trim()) return;
    const segs = customSegs.map(s => parseFloat(s) || 0).filter(n => !isNaN(n));
    if (segs.length < 2) return;
    const newPresets = [...presets, { name: newPresetName.trim(), segments: segs }];
    setPresets(newPresets);
    localStorage.setItem('te_wheel_presets', JSON.stringify(newPresets));
    await saveWheelPresets(newPresets);
    setNewPresetName('');
    setShowSavePreset(false);
  };

  const deletePreset = async (idx) => {
    const newPresets = presets.filter((_,i)=>i!==idx);
    setPresets(newPresets);
    localStorage.setItem('te_wheel_presets', JSON.stringify(newPresets));
    await saveWheelPresets(newPresets);
    if (selPreset === idx) setSelPreset(null);
    if (selPreset > idx) setSelPreset(selPreset - 1);
  };

  const go = async () => {
    if (!sid||ca<=0) { setErr('Fill in all fields with valid amounts'); return; }
    setLd(true); setErr(''); setOk('');
    try {
      const now = new Date().toISOString();
      const maxRowRes = await sf(`/rest/v1/ledger?profile_id=eq.${sid}&select=row_order&order=row_order.desc&limit=1`);
      const nextRow = (maxRowRes && maxRowRes[0] ? (maxRowRes[0].row_order || 0) + 1 : 1);
      await insertLedger({ profile_id:sid, entry_type:type, entry_date:now, amount:isPay?-ca:ca, balance_after:nb, description:notes||null, admin_fee:fee>0?fee:0, created_at:now, tokens_awarded:te>0?te:0, payment_method:payMethod||null, row_order:nextRow });
      await patchProfile(sid, { current_balance: nb });
      if (te>0) {
        const ct=parseFloat(pr.token_balance)||0; const ce=parseFloat(pr.tokens_earned)||0;
        await patchProfile(sid, { token_balance:ct+te, tokens_earned:ce+te });
        await insertTokenTx({ profile_id:sid, transaction_date:now, amount:te, balance_after:ct+te, description:`${te} tokens for ${fmt(ca)} payment`, created_at:now });
      }
      let okMsg = `✅ ${type} of ${fmt(ca)}${fee>0?` + ${fmt(fee)} fee`:''} recorded for ${privacyMode ? pr.debtor_number : pr.display_name}. New balance: ${fmt(nb)}${te>0?`. 🪙 ${te} tokens!`:''}`;
 
      // Send notification to debtor for all transaction types
      try {
        const notifIcons = { 'Payment': '💰', 'Interest': '📈', 'Fine': '⚠️', 'Deposit': '🏦', 'Debt Game': '🎮' };
        const notifIcon = notifIcons[type] || '📋';
 
        // Build notification message
        let notifTitle = '';
        let notifMsg = '';
 
        if (type === 'Payment') {
          notifTitle = 'Payment Recorded';
          notifMsg = `Your payment of ${fmt(ca)} has been recorded.`;
          if (fee > 0) notifMsg += ` Admin fee: ${fmt(fee)}.`;
          if (te > 0) notifMsg += ` You earned ${te} tokens!`;
          notifMsg += ` New balance: ${fmt(nb)}.`;
        } else if (type === 'Interest') {
          notifTitle = 'Interest Applied';
          notifMsg = `${pct}% interest (${fmt(ca)}) has been applied to your balance.`;
          if (fee > 0) notifMsg += ` Admin fee: ${fmt(fee)}.`;
          notifMsg += ` New balance: ${fmt(nb)}.`;
        } else if (type === 'Fine') {
          notifTitle = 'Fine Added';
          notifMsg = `A fine of ${fmt(ca)} has been added to your balance.`;
          if (notes) notifMsg += ` Reason: ${notes}.`;
          if (fee > 0) notifMsg += ` Admin fee: ${fmt(fee)}.`;
          notifMsg += ` New balance: ${fmt(nb)}.`;
        } else if (type === 'Deposit') {
          notifTitle = 'Deposit Recorded';
          notifMsg = `A deposit of ${fmt(ca)} has been recorded.`;
          if (fee > 0) notifMsg += ` Admin fee: ${fmt(fee)}.`;
          notifMsg += ` New balance: ${fmt(nb)}.`;
        } else if (type === 'Debt Game') {
          notifTitle = 'Debt Game Result';
          notifMsg = `A debt game result of ${fmt(ca)} has been applied.`;
          if (notes) notifMsg += ` Details: ${notes}.`;
          if (fee > 0) notifMsg += ` Admin fee: ${fmt(fee)}.`;
          notifMsg += ` New balance: ${fmt(nb)}.`;
        }
 
        // For interest with wheel spin, include wheel data
        let wheelData = null;
        if (isInt && sendSpinNotif && lastWheelData) {
          wheelData = {
            segments: lastWheelData.segments,
            result_index: lastWheelData.idx,
            result_pct: parseFloat(pct),
            interest_amount: parseFloat(ca) || 0,
            new_balance: parseFloat(nb) || 0,
            show_animation: true
          };
          notifTitle = 'Interest Wheel Spun';
          notifMsg = `The Empress spun your interest wheel. Result: ${pct}% — ${fmt(ca)} added to your balance. New balance: ${fmt(nb)}.`;
        }
 
        // Skip notification for interest wheel spins if toggle is off
        const shouldSend = !(isInt && lastWheelData && !sendSpinNotif);
 
        if (shouldSend) {
          await sf('/rest/v1/notifications', {
            method: 'POST',
            headers: { 'Prefer': 'return=representation' },
            body: JSON.stringify({
              profile_id: sid,
              notification_type: wheelData ? 'wheel_spin' : 'general',
              title: notifTitle,
              message: notifMsg,
              wheel_data: wheelData,
              created_at: new Date().toISOString()
            })
          });
          okMsg += '\n📨 Notification sent to debtor.';
        }
      } catch(notifErr) {
        okMsg += '\n⚠️ Failed to send notification: ' + notifErr.message;
      }
 
      setOk(okMsg);
      setAmt(''); setPct(''); setNotes(''); setPayMethod(''); setShowWheel(false);
      onDone?.();
    } catch(e) { setErr('Error: '+e.message); }
    setLd(false);
  };

  return (
    <div className="page">
      <div className="page-title">Add Transaction</div>
      <div className="form-group"><label className="form-label">Debtor</label>
        <select className="fs" value={sid} onChange={e=>{setSid(e.target.value);setOk('');setShowWheel(false);}}>
          <option value="">Select debtor...</option>
          {profiles.map(p=>{const un=p.username?` @${p.username}`:'';return(<option key={p.id} value={p.id}>{p.debtor_number} — {privacyMode ? '••••' : p.display_name}{privacyMode?'':un} ({fmt(p.current_balance)})</option>);})}
        </select>
      </div>

      {/* === DEBTOR RULES INFO BOX === */}
      {sid && st && (
        <div className="rules-box">
          <div className="rules-title">📋 {privacyMode ? pr?.debtor_number : pr?.display_name}'s Rules</div>
          <div className="rules-grid">
            <div className="di"><div className="di-label">Weekly Payment</div><div className="di-value">{fmt(st.weekly_payment)}</div></div>
            <div className="di"><div className="di-label">Payment Day</div><div className="di-value">{st.payment_day||'—'}</div></div>
            <div className="di"><div className="di-label">Admin Fee</div><div className="di-value">{st.admin_fee||'—'}</div></div>
            <div className="di"><div className="di-label">Late Fee</div><div className="di-value">{st.late_fee||'—'}</div></div>
            <div className="di"><div className="di-label">Interest Wheel</div><div className="di-value" style={{fontSize:'12px'}}>{st.interest_wheel||'—'}</div></div>
            <div className="di"><div className="di-label">High Interest</div><div className="di-value" style={{fontSize:'12px'}}>{st.high_interest_wheel||'—'}</div></div>
            {st.high_interest_threshold && <div className="di"><div className="di-label">High Int. Threshold</div><div className="di-value">{fmt(st.high_interest_threshold)}</div></div>}
            {st.fine_review_date && <div className="di"><div className="di-label">Fine Review</div><div className="di-value">{fmtD(st.fine_review_date)}</div></div>}
          </div>
          {(st.fines_json || st.admin_fee || st.late_fee) && (
            <div style={{marginTop:'10px'}}>
              <div style={{fontSize:'11px',color:'var(--gold)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'6px'}}>Fine Rules</div>
              {feeInfo(st)?.split('\n').map((line,i) => (
                <div key={i} style={{fontSize:'12px',color:'var(--text-dim)',lineHeight:1.6,padding:'3px 0',borderBottom:'1px solid var(--border)',display:'flex',gap:'6px'}}>
                  <span style={{color:'var(--gold)',flexShrink:0}}>•</span>
                  <span>{line}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      <div className="form-group"><label className="form-label">Type</label>
        <select className="fs" value={type} onChange={e=>{setType(e.target.value);setShowWheel(false);}}>
          <option value="Payment">Payment (reduces balance)</option>
          <option value="Interest">Interest (% of balance)</option>
          <option value="Fine">Fine</option>
          <option value="Deposit">Deposit</option>
          <option value="Debt Game">Debt Game</option>
        </select>
      </div>

      {isInt ? (
        <div>
          <div className="form-group"><label className="form-label">Interest %</label>
            <input className="fi" type="number" inputMode="decimal" placeholder="e.g. 25" value={pct} onChange={e=>setPct(e.target.value)} />
            {pr&&pct&&<div className="form-hint">{pct}% of {fmt(bal)} = {fmt(ca)}</div>}
          </div>

{/* Send spin to debtor toggle */}
          {pct && parseFloat(pct) > 0 && (
            <div style={{marginBottom:'12px'}}>
              <label className="cb-row">
                <input type="checkbox" checked={sendSpinNotif} onChange={e=>setSendSpinNotif(e.target.checked)} />
                <span style={{fontSize:'13px'}}>🎡 Send wheel spin animation to debtor</span>
              </label>
              <div className="form-hint">Debtor will see the wheel spin and result on their portal next time they log in.</div>
            </div>
          )}
          
          {sid && (
            <div style={{marginBottom:'16px'}}>
              <button className="btn btn-outline btn-sm" onClick={()=>setShowWheel(!showWheel)} style={{width:'100%',marginBottom:'12px'}}>
                {showWheel ? '✕ Hide Wheel' : '🎡 Spin Interest Wheel'}
              </button>

              {showWheel && (
                <div>
                  <div className="wheel-tabs">
                    <button className={`wheel-tab ${wheelMode==='debtor'?'active':''}`} onClick={()=>{setWheelMode('debtor');setSelPreset(null);}}>Debtor's Wheel</button>
                    <button className={`wheel-tab ${wheelMode==='custom'?'active':''}`} onClick={()=>{setWheelMode('custom');setSelPreset(null);}}>Custom</button>
                    <button className={`wheel-tab ${wheelMode==='presets'?'active':''}`} onClick={()=>setWheelMode('presets')}>Presets</button>
                  </div>

                  {wheelMode === 'debtor' && (
                    <div>
                      {st ? (
                        <div>
                          {parseFloat(st.high_interest_threshold) > 0 && bal < parseFloat(st.high_interest_threshold) && (
                            <div className="alert-item warn" style={{marginBottom:'12px',cursor:'default'}}>
                              <span className="alert-icon">⚡</span>
                              <span className="alert-text">Balance ({fmt(bal)}) is below high interest threshold ({fmt(st.high_interest_threshold)}). Using <strong>high interest wheel</strong>.</span>
                            </div>
                          )}
                          {getWheelSegs().length > 0 ? (
                            <SpinWheel segments={getWheelSegs()} onResult={handleWheelResult} balance={bal} />
                          ) : (
                            <div className="empty-state">Couldn't parse wheel values from: "{st.interest_wheel || 'not set'}".<br/>Try Custom wheel instead.</div>
                          )}
                        </div>
                      ) : (
                        <div className="empty-state">No stipulations found for this debtor.</div>
                      )}
                    </div>
                  )}

                  {wheelMode === 'custom' && (
                    <div>
                      <div style={{fontSize:'12px',color:'var(--text-dim)',marginBottom:'10px'}}>Enter percentages for each wheel segment:</div>
                      {customSegs.map((s,i) => (
                        <div className="cw-row" key={i}>
                          <input className="fi" type="number" inputMode="decimal" value={s} onChange={e=>{const n=[...customSegs];n[i]=e.target.value;setCustomSegs(n);}} placeholder="%" />
                          <span style={{color:'var(--text-muted)',fontSize:'13px'}}>%</span>
                          {customSegs.length > 2 && <button className="cw-del" onClick={()=>{const n=customSegs.filter((_,j)=>j!==i);setCustomSegs(n);}}>×</button>}
                        </div>
                      ))}
                      <button className="cw-add" onClick={()=>setCustomSegs([...customSegs,'0'])}>+ Add Segment</button>

                      {!showSavePreset && (
                        <button className="btn btn-outline btn-sm" onClick={()=>setShowSavePreset(true)} style={{width:'100%',marginBottom:'12px'}}>💾 Save as Preset</button>
                      )}
                      {showSavePreset && (
                        <div style={{display:'flex',gap:'8px',marginBottom:'12px'}}>
                          <input className="fi" placeholder="Preset name..." value={newPresetName} onChange={e=>setNewPresetName(e.target.value)} style={{flex:1}} />
                          <button className="btn btn-sm" onClick={savePreset}>Save</button>
                          <button className="btn btn-sm btn-outline" onClick={()=>setShowSavePreset(false)}>Cancel</button>
                        </div>
                      )}

                      {getWheelSegs().length >= 2 && (
                        <SpinWheel segments={getWheelSegs()} onResult={handleWheelResult} balance={bal} />
                      )}
                    </div>
                  )}

                  {wheelMode === 'presets' && (
                    <div>
                      {presets.length === 0 ? (
                        <div className="empty-state">No saved presets yet. Create one in the Custom tab.</div>
                      ) : (
                        <div className="preset-list">
                          {presets.map((p,i) => (
                            <div className={`preset-chip ${selPreset===i?'selected':''}`} key={i} onClick={()=>setSelPreset(i)}>
                              <div>
                                <div className="preset-name">{p.name}</div>
                                <div className="preset-vals">{p.segments.join('%, ')}%</div>
                              </div>
                              <button className="preset-del" onClick={(e)=>{e.stopPropagation();deletePreset(i);}}>🗑</button>
                            </div>
                          ))}
                        </div>
                      )}

                      {selPreset !== null && getWheelSegs().length >= 2 && (
                        <SpinWheel segments={getWheelSegs()} onResult={handleWheelResult} balance={bal} />
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      ) : (
        <div className="form-group"><label className="form-label">Amount (£)</label>
          <input className="fi" type="number" inputMode="decimal" placeholder="0.00" value={amt} onChange={e=>setAmt(e.target.value)} />
        </div>
      )}
      <div className="form-group"><label className="form-label">Admin Fee</label>
        <label className="cb-row"><input type="checkbox" checked={addFee} onChange={e=>setAddFee(e.target.checked)} /><span>Add admin fee</span></label>
        {addFee&&<input className="fi" type="number" inputMode="decimal" placeholder="5.00" value={feeAmt} onChange={e=>setFeeAmt(e.target.value)} style={{marginTop:'8px'}} />}
        {st && st.admin_fee && <div className="form-hint">Rule: {st.admin_fee}</div>}
      </div>
      <div className="form-group"><label className="form-label">Platform</label>
        <select className="fs" value={payMethod} onChange={e=>setPayMethod(e.target.value)}>
          <option value="">Select platform...</option>
          <option value="LoyalFans">LoyalFans</option>
          <option value="iWantClips">iWantClips</option>
          <option value="Clips4Sale">Clips4Sale</option>
          <option value="MintStars">MintStars</option>
          <option value="FinMessage">FinMessage</option>
          <option value="X/Twitter">X / Twitter</option>
          <option value="Throne">Throne</option>
          <option value="Wishtender">Wishtender</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div className="form-group"><label className="form-label">Notes (optional)</label>
        <textarea className="ft" placeholder="Any notes..." value={notes} onChange={e=>setNotes(e.target.value)} />
      </div>
      {sid&&ca>0&&(
        <div className="preview-box">
          <div className="preview-title">Preview</div>
          <div className="preview-row"><span>Current Balance</span><span>{fmt(bal)}</span></div>
          <div className="preview-row"><span>{type}</span><span style={{color:isPay?'var(--green)':'var(--red)'}}>{isPay?'-':'+'}{fmt(ca)}</span></div>
          {fee>0&&<div className="preview-row"><span>Admin Fee</span><span style={{color:'var(--red)'}}>+{fmt(fee)}</span></div>}
          {te>0&&<div className="preview-row"><span>Tokens Earned</span><span style={{color:'var(--blue)'}}>🪙 +{te}</span></div>}
          <div className="preview-row total"><span>New Balance</span><span>{fmt(nb)}</span></div>
        </div>
      )}
      {err&&<div className="error-msg" style={{marginBottom:'12px'}}>{err}</div>}
      {ok&&<div className="success-msg" style={{marginBottom:'12px'}}>{ok}</div>}
      <button className="btn" onClick={go} disabled={ld} style={{width:'100%'}}>{ld?<span className="spinner"/>:'Submit Transaction'}</button>
    </div>
  );
}

// ========== SETTINGS PAGE ==========
function Settings({ onLogout }) {
  const [curPw, setCurPw] = useState('');
  const [newPw, setNewPw] = useState('');
  const [confPw, setConfPw] = useState('');
  const [ld, setLd] = useState(false);
  const [err, setErr] = useState('');
  const [ok, setOk] = useState('');

  const doPwChange = async () => {
    setErr(''); setOk('');
    if (!newPw || !confPw) { setErr('Please fill in both password fields.'); return; }
    if (newPw.length < 6) { setErr('Password must be at least 6 characters.'); return; }
    if (newPw !== confPw) { setErr('New passwords don\'t match.'); return; }
    setLd(true);
    try {
      await changePassword(newPw);
      setOk('✅ Password changed successfully!');
      setCurPw(''); setNewPw(''); setConfPw('');
    } catch(e) {
      setErr('Error: ' + e.message);
    }
    setLd(false);
  };

  return (
    <div className="page">
      <div className="page-title">Settings</div>

      <div className="settings-section">
        <div className="settings-title">🔐 Change Password</div>
        <div className="form-group">
          <label className="form-label">New Password</label>
          <input className="fi" type="password" placeholder="Enter new password" value={newPw} onChange={e=>setNewPw(e.target.value)} autoComplete="new-password" />
        </div>
        <div className="form-group">
          <label className="form-label">Confirm New Password</label>
          <input className="fi" type="password" placeholder="Confirm new password" value={confPw} onChange={e=>setConfPw(e.target.value)} autoComplete="new-password" />
        </div>
        {err && <div className="error-msg" style={{marginBottom:'12px'}}>{err}</div>}
        {ok && <div className="success-msg" style={{marginBottom:'12px'}}>{ok}</div>}
        <button className="btn" onClick={doPwChange} disabled={ld} style={{width:'100%'}}>{ld?<span className="spinner"/>:'Update Password'}</button>
      </div>

      <div className="settings-section">
        <div className="settings-title">👤 Account</div>
        <div style={{fontSize:'13px',color:'var(--text-dim)',marginBottom:'16px'}}>
          Signed in as admin<br/>
          <span style={{fontSize:'11px',color:'var(--text-muted)'}}>User ID: {ADMIN_ID.slice(0,8)}...</span>
        </div>
        <button className="btn btn-outline" onClick={onLogout} style={{width:'100%'}}>Sign Out</button>
      </div>
    </div>
  );
}

// ========== EDIT FINES / CLAUSES INLINE ==========
function EditFines({ st, pid, onSaved }) {
  const [fines, setFines] = useState([]);
  const [saving, setSaving] = useState(false);
  const [ok, setOk] = useState('');

  useEffect(() => {
    const f = pj(st?.fines_json);
    if (Array.isArray(f)) setFines(f.map(x => typeof x === 'string' ? {name:x,amount:'',detail:''} : x));
    else setFines([]);
  }, [st]);

  const addFine = () => setFines([...fines, {name:'',amount:'',detail:''}]);
  const updateFine = (i, key, val) => { const n=[...fines]; n[i]={...n[i],[key]:val}; setFines(n); };
  const removeFine = (i) => setFines(fines.filter((_,j)=>j!==i));

  const save = async () => {
    setSaving(true); setOk('');
    try {
      const clean = fines.filter(f => f.name?.trim());
      await patchStipulations(pid, { fines_json: JSON.stringify(clean) });
      setOk('✅ Fines updated');
      onSaved?.();
    } catch(e) { setOk('Error: '+e.message); }
    setSaving(false);
  };

  return (
    <div style={{marginTop:'12px'}}>
      <div style={{fontSize:'12px',fontWeight:600,color:'var(--gold)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>Edit Fines</div>
      {fines.map((f,i) => (
        <div key={i} style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'10px',marginBottom:'6px'}}>
          <div style={{display:'flex',gap:'6px',marginBottom:'6px'}}>
            <input className="fi" placeholder="Fine name" value={f.name||''} onChange={e=>updateFine(i,'name',e.target.value)} style={{flex:1,padding:'8px 10px',fontSize:'13px'}} />
            <button className="cw-del" onClick={()=>removeFine(i)}>×</button>
          </div>
          <div style={{display:'flex',gap:'6px'}}>
            <input className="fi" placeholder="Amount" value={f.amount||''} onChange={e=>updateFine(i,'amount',e.target.value)} style={{flex:1,padding:'8px 10px',fontSize:'13px'}} />
            <input className="fi" placeholder="Trigger/detail" value={f.detail||''} onChange={e=>updateFine(i,'detail',e.target.value)} style={{flex:2,padding:'8px 10px',fontSize:'13px'}} />
          </div>
        </div>
      ))}
      <button className="cw-add" onClick={addFine}>+ Add Fine</button>
      {ok && <div className={ok.startsWith('✅')?'success-msg':'error-msg'} style={{marginBottom:'8px'}}>{ok}</div>}
      <button className="btn btn-sm" onClick={save} disabled={saving} style={{width:'100%'}}>{saving?<span className="spinner"/>:'Save Fines'}</button>
    </div>
  );
}

function EditClauses({ st, pid, onSaved }) {
  const [clauses, setClauses] = useState([]);
  const [saving, setSaving] = useState(false);
  const [ok, setOk] = useState('');

  useEffect(() => {
    const c = pj(st?.special_clauses_json);
    if (Array.isArray(c)) setClauses(c);
    else if (typeof c === 'string') setClauses([c]);
    else setClauses([]);
  }, [st]);

  const save = async () => {
    setSaving(true); setOk('');
    try {
      const clean = clauses.filter(c => { if (typeof c === 'string') return c.trim().length > 0; if (c && typeof c === 'object') return true; return Boolean(c); });
      await patchStipulations(pid, { special_clauses_json: JSON.stringify(clean) });
      setOk('✅ Clauses updated');
      onSaved?.();
    } catch(e) { setOk('Error: '+e.message); }
    setSaving(false);
  };

  return (
    <div style={{marginTop:'12px'}}>
      <div style={{fontSize:'12px',fontWeight:600,color:'var(--blue)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>Edit Special Clauses</div>
      {clauses.map((c,i) => (
        <div key={i} className="cw-row">
          <input className="fi" value={c} onChange={e=>{const n=[...clauses];n[i]=e.target.value;setClauses(n);}} style={{flex:1,padding:'8px 10px',fontSize:'13px'}} />
          <button className="cw-del" onClick={()=>setClauses(clauses.filter((_,j)=>j!==i))}>×</button>
        </div>
      ))}
      <button className="cw-add" onClick={()=>setClauses([...clauses,''])}>+ Add Clause</button>
      {ok && <div className={ok.startsWith('✅')?'success-msg':'error-msg'} style={{marginBottom:'8px'}}>{ok}</div>}
      <button className="btn btn-sm" onClick={save} disabled={saving} style={{width:'100%'}}>{saving?<span className="spinner"/>:'Save Clauses'}</button>
    </div>
  );
}

function Onboard({ profiles, onDone }) {
  const [saving, setSaving] = useState(false);
  const [ok, setOk] = useState('');
  const [err, setErr] = useState('');

  // Profile fields
  const [debtorNum, setDebtorNum] = useState('');
  const [displayName, setDisplayName] = useState('');
  const [username, setUsername] = useState('');
  const [tier, setTier] = useState('Bronze');
  const [contractTotal, setContractTotal] = useState('');
  const [deposit, setDeposit] = useState('');
  const [weeklyPayment, setWeeklyPayment] = useState('');

  // Stipulations
  const [paymentDay, setPaymentDay] = useState('Every Friday');
  const [interestWheel, setInterestWheel] = useState('');
  const [highInterestWheel, setHighInterestWheel] = useState('');
  const [highInterestThreshold, setHighInterestThreshold] = useState('');
  const [adminFee, setAdminFee] = useState('');
  const [lateFee, setLateFee] = useState('');
  const [platform, setPlatform] = useState('LoyalFans');
  const [debtLevel, setDebtLevel] = useState('Beginner');
  const [notes, setNotes] = useState('');

  // Auto-suggest next debtor number
  useEffect(() => {
    if (profiles.length > 0 && !debtorNum) {
      const nums = profiles.map(p => parseInt(p.debtor_number) || 0);
      const next = Math.max(...nums) + 1;
      setDebtorNum(String(next).padStart(3, '0'));
    }
  }, [profiles]);

  const cv = parseFloat(contractTotal) || 0;
  const dp = parseFloat(deposit) || 0;
  const startingBalance = cv - dp;

  // Service role key loaded from app_settings (not hardcoded for security)
 const WIX_SITE = '6830a889-5f45-45ed-b828-cc5bc79fee83';

  const genPw = (dn) => {
    const c = 'abcdefghjkmnpqrstuvwxyzABCDEFGHJKMNPQRSTUVWXYZ23456789';
    let r = ''; for (let i = 0; i < 4; i++) r += c[Math.floor(Math.random() * c.length)];
    return `Truee_D${dn}_${r}!`;
  };

  const doOnboard = async () => {
setErr(''); setOk('');
if (!debtorNum.trim()) { setErr('Debtor number is required'); return; }
if (!displayName.trim()) { setErr('Name is required'); return; }
if (cv <= 0) { setErr('Contract value must be greater than 0'); return; }

    const dn = debtorNum.trim();
const existing = profiles.find(p => p.debtor_number === dn);
if (existing) { setErr(`Debtor number ${dn} already exists (${existing.display_name})`); return; }

setSaving(true);
const tempPw = genPw(dn);
const email = `d${dn}@trueeempire.local`;
let steps = [];

try {
  // Call the server-side function to create everything
  const result = await sf('/rest/v1/rpc/admin_create_user', {
    method: 'POST',
    body: JSON.stringify({
      p_email: email,
      p_password: tempPw,
      p_debtor_number: dn,
      p_display_name: displayName.trim(),
      p_username: username.trim() || null,
      p_tier: tier,
      p_contract_total: cv,
      p_deposit: dp,
      p_weekly_payment: parseFloat(weeklyPayment) || 0,
      p_payment_day: paymentDay,
      p_interest_wheel: interestWheel || '',
      p_high_interest_wheel: highInterestWheel || '',
      p_high_interest_threshold: parseFloat(highInterestThreshold) || 0,
      p_admin_fee: adminFee || '',
      p_late_fee: lateFee || '',
      p_notes: notes || ''
    })
  });

  steps.push('✅ Login account created');
  steps.push('✅ Profile created');
  steps.push('✅ Contract terms saved');
  steps.push('✅ Opening ledger entry created');

  // Create Wix CMS entry (this uses the admin's token, not service key)
  try {
    const wixKeyRes = await sf('/rest/v1/app_settings?key=eq.wix_api_key&select=value');
    const wixApiKey = wixKeyRes?.[0]?.value;

    if (wixApiKey) {
      const wixRes = await fetch('https://www.wixapis.com/wix-data/v2/items', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': wixApiKey,
          'wix-site-id': WIX_SITE
        },
        body: JSON.stringify({
          dataCollectionId: 'DebtProfiles',
          dataItem: {
            data: {
              debtorId: 'D' + dn,
              name: displayName.trim(),
              currentBalance: cv - dp,
              debtTier: tier,
              spendBadge: 'New',
              totalSpent: dp,
              status: 'Active'
            }
          }
        })
      });
      if (wixRes.ok) {
        steps.push('✅ Wix portal entry created');
      } else {
        const wixErr = await wixRes.text();
        steps.push('⚠️ Wix: ' + wixErr.slice(0, 80));
      }
    } else {
      steps.push('⚠️ Wix API key not found — add manually to portal');
    }
  } catch(wixE) {
    steps.push('⚠️ Wix sync failed — add manually to portal');
  }

  setOk(
    `🎉 ${displayName} (D${dn}) fully onboarded!\n\n` +
    steps.join('\n') +
    `\n\n📧 Login: ${email}\n🔑 Temp Password: ${tempPw}\n\n` +
    `Send them this message:\nNEW temp password!\n${tempPw}\nI've updated the back end 😈`
  );
  onDone?.();

  // Reset form
  setDisplayName(''); setUsername(''); setContractTotal(''); setDeposit('');
  setWeeklyPayment(''); setInterestWheel(''); setHighInterestWheel('');
  setHighInterestThreshold(''); setAdminFee(''); setLateFee(''); setNotes('');
  const nextNum = parseInt(dn) + 1;
  setDebtorNum(String(nextNum).padStart(3, '0'));
} catch(e) {
  setErr('Error: ' + e.message + (steps.length ? '\n\nCompleted:\n' + steps.join('\n') : ''));
}
setSaving(false);
};

  return (
    <div className="page">
      <div className="page-title">🆕 Onboard New Debtor</div>

      <div className="settings-section">
        <div className="settings-title">👤 Debtor Info</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>

          </div>
        </div>
      </div>

      <div className="settings-section">

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px'}}>
          <div className="form-group" style={{margin:0}}>
